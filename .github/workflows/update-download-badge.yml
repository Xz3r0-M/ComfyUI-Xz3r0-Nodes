name: Update Download Badge

on:
  schedule:
    # 每天 UTC 0:00 和 12:00 (中国时间 8:00 和 20:00)
    - cron: '0 0,12 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write      # 允许 push 提交

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 获取 ComfyRegistry 下载数
        run: |
          RESPONSE=$(curl -s "https://api.comfy.org/nodes/xz3r0-nodes")
          DOWNLOADS=$(echo "$RESPONSE" | jq -r '.downloads')
          STARS=$(echo "$RESPONSE" | jq -r '.github_stars')
          NAME=$(echo "$RESPONSE" | jq -r '.name')

          echo "downloads=$DOWNLOADS" >> $GITHUB_ENV
          echo "stars=$STARS" >> $GITHUB_ENV
          echo "name=$NAME" >> $GITHUB_ENV

          echo "📦 $NAME: ⬇ $DOWNLOADS | ⭐ $STARS"

      - name: 更新 badge.json
        run: |
          cat > docs/badge.json << EOF
          {
            "schemaVersion": 1,
            "label": "downloads",
            "message": "${{ env.downloads }}",
            "color": "brightgreen",
            "cacheSeconds": 3600
          }
          EOF

      - name: 更新历史曲线数据
        run: |
          TODAY=$(date +%Y-%m-%d)

          if [ -f docs/downloads-history.json ]; then
            jq --arg date "$TODAY" --argjson count "${{ env.downloads }}" '
              if .[-1].date == $date then
                .[-1].downloads = $count
              else
                . + [{"date": $date, "downloads": $count}]
              end
              | .[-90:]
            ' docs/downloads-history.json > /tmp/history.json
            mv /tmp/history.json docs/downloads-history.json
          else
            echo '[{"date": "'$TODAY'", "downloads": ${{ env.downloads }}}]' > docs/downloads-history.json
          fi

          echo "📈 历史数据已更新（保留最近 90 天）"

      - name: 生成 SVG 火花线图
        run: |
          python3 << 'PYEOF'
          import json

          W, H = 500, 100
          PAD = 4
          GREEN = "#3fb950"

          with open('docs/downloads-history.json') as f:
              history = json.load(f)
          history = history[-60:]
          data = [entry['downloads'] for entry in history]
          n = len(data)

          if n == 0:
              svg = f'<svg xmlns="http://www.w3.org/2000/svg" width="{W}" height="{H}">'
              svg += f'<rect width="{W}" height="{H}" fill="#0d1117" rx="4"/>'
              svg += '<text x="50%" y="50%" fill="#8b949e" font-size="14" font-family="sans-serif" text-anchor="middle" dominant-baseline="middle">数据收集中...</text>'
              svg += '</svg>'
          elif n == 1:
              # 单数据点：显示一个点 + 数值
              svg = f'<svg xmlns="http://www.w3.org/2000/svg" width="{W}" height="{H}" viewBox="0 0 {W} {H}">'
              svg += f'<rect width="{W}" height="{H}" fill="#0d1117" rx="4"/>'
              svg += f'<circle cx="{W//2}" cy="{H//2}" r="4" fill="{GREEN}"/>'
              svg += f'<text x="{W//2}" y="{H//2 - 12}" fill="{GREEN}" font-size="16" font-family="sans-serif" text-anchor="middle" font-weight="bold">{data[0]}</text>'
              svg += '<text x="50%" y="75%" fill="#8b949e" font-size="11" font-family="sans-serif" text-anchor="middle">再多等一天就有曲线啦</text>'
              svg += '</svg>'
          else:
              mn, mx = min(data), max(data)
              rng = mx - mn or 1

              x_step = (W - 2 * PAD) / (n - 1)

              def x(i): return PAD + i * x_step
              def y(v): return H - PAD - ((v - mn) / rng) * (H - 2 * PAD)

              # 折线点
              pts = [f"{x(i):.1f},{y(v):.1f}" for i, v in enumerate(data)]
              polyline = " ".join(pts)

              # 填充区域（折线 + 底部两个角）
              fill_pts = pts + [f"{x(n-1):.1f},{H - PAD}", f"{x(0):.1f},{H - PAD}"]
              polygon = " ".join(fill_pts)

              svg = f'<svg xmlns="http://www.w3.org/2000/svg" width="{W}" height="{H}" viewBox="0 0 {W} {H}">'
              svg += '<defs>'
              svg += f'<linearGradient id="g" x1="0" y1="0" x2="0" y2="1">'
              svg += f'<stop offset="0%" stop-color="{GREEN}" stop-opacity="0.25"/>'
              svg += f'<stop offset="100%" stop-color="{GREEN}" stop-opacity="0.0"/>'
              svg += '</linearGradient>'
              svg += '</defs>'
              # 背景
              svg += f'<rect width="{W}" height="{H}" fill="#0d1117" rx="4"/>'
              # 填充
              svg += f'<polygon points="{polygon}" fill="url(#g)"/>'
              # 折线
              svg += f'<polyline points="{polyline}" fill="none" stroke="{GREEN}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'
              # 末尾圆点
              svg += f'<circle cx="{x(n-1):.1f}" cy="{y(data[-1]):.1f}" r="3" fill="{GREEN}"/>'
              svg += '</svg>'

          with open('docs/sparkline.svg', 'w', encoding='utf-8') as f:
              f.write(svg)

          # 更新 README 中的缓存版本号（打破 GitHub camo 缓存）
          import re, datetime
          today = datetime.date.today().strftime('%Y%m%d')
          with open('README.md', 'r', encoding='utf-8') as f:
              readme = f.read()
          readme = re.sub(
              r'!\[下载趋势\]\(https://xz3r0-m\.github\.io/ComfyUI-Xz3r0-Nodes/sparkline\.svg\?v=[^)]*\)',
              f'![下载趋势](https://xz3r0-m.github.io/ComfyUI-Xz3r0-Nodes/sparkline.svg?v={today})',
              readme
          )
          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(readme)

          print(f"✅ SVG 火花线图已生成 ({n} 个数据点)")
          PYEOF

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/badge.json docs/downloads-history.json docs/sparkline.svg
          if git diff --staged --quiet; then
            echo "📭 无变化，跳过提交"
          else
            git commit -m "📊 更新下载: ${{ env.downloads }}"
            git push
            echo "✅ 已推送: downloads=${{ env.downloads }}"
          fi
