<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XDataHub 数据浏览</title>
    <link rel="stylesheet" href="./xdatahub-color-tokens.css?v=20260323-48">
    <style>
        /*
           颜色规范：
           1) 本文件必须引用 ./xdatahub-color-tokens.css 作为颜色变量来源。
           2) 默认禁止在本文件直接硬编码颜色值；如需硬编码，必须由用户明确要求。
           3) 文本与边框命名必须镜像：standard/hover/active/emphasis。 */

        * {
            box-sizing: border-box;
            scrollbar-width: auto;
            scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
        }

        *::-webkit-scrollbar {
            width: var(--scrollbar-size);
            height: var(--scrollbar-size);
        }

        *::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
            border-radius: 999px;
        }

        *::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border: 2px solid var(--scrollbar-track);
            border-radius: 999px;
            min-height: 34px;
        }

        *::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-thumb-hover);
        }

        *::-webkit-scrollbar-thumb:active {
            background: var(--scrollbar-thumb-active);
        }

        *::-webkit-scrollbar-corner {
            background: var(--scrollbar-corner);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-standard);
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: 14px;
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            gap: 8px;
            padding: var(--app-shell-padding);
        }

        .tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            border: 1px solid var(--border-standard);
            background: transparent;
            color: var(--text-standard);
            border-radius: 6px;
            padding: 6px 10px;
            font-weight: 700;
            cursor: pointer;
            transition: border-color 120ms ease, background-color 120ms ease,
                color 120ms ease, box-shadow 120ms ease;
        }

        .tab-btn:not(.active):hover {
            border-color: var(--border-hover);
            background: rgba(var(--state-accent-rgb), 0.08);
        }

        .tab-btn.active {
            border-color: var(--border-active);
            color: var(--state-accent-text-standard);
        }

        .btn {
            border: 1px solid var(--border-standard);
            background: transparent;
            color: var(--text-standard);
            border-radius: 6px;
            padding: 6px 10px;
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
            transition: border-color 120ms ease, background-color 120ms ease,
                color 120ms ease, box-shadow 120ms ease;
        }

        .btn .btn-emoji {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .btn .btn-text {
            display: inline;
        }

        .xdatahub-icon {
            width: 1em;
            height: 1em;
            display: inline-block;
            vertical-align: middle;
            filter: var(--icon-color-filter);
        }

        .btn:not(:disabled):not(.active):hover {
            border-color: var(--border-hover);
            background: rgba(var(--btn-hover-glow-rgb), 0.08);
            box-shadow: var(--btn-hover-glow-soft);
        }

        .btn.primary {
            border-color: var(--border-standard);
            color: var(--text-standard);
        }

        .btn.success {
            border-color: var(--border-standard);
            color: var(--text-standard);
        }

        .btn.warn {
            border-color: var(--border-standard);
            color: var(--text-standard);
        }

        .btn.active {
            border-color: var(--border-active);
            color: var(--text-active);
            box-shadow: var(--btn-hover-glow);
            background: rgba(var(--btn-hover-glow-rgb), 0.1);
        }

        .search-btn {
            transition: transform 120ms ease, box-shadow 120ms ease,
                border-color 120ms ease, background-color 120ms ease,
                color 120ms ease;
        }

        .search-btn:not(:disabled):not(.clicked):hover {
            border-color: var(--border-hover);
            background: rgba(var(--btn-hover-glow-rgb), 0.12);
            box-shadow: var(--btn-hover-glow-strong);
        }

        .search-btn:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: var(--btn-press-glow-inset);
        }

        .search-btn.clicked {
            border-color: var(--border-active);
            color: var(--text-active);
            box-shadow: var(--btn-hover-glow);
            background: rgba(var(--btn-hover-glow-rgb), 0.14);
        }

        .btn.danger {
            border-color: var(--border-standard);
            color: var(--text-standard);
        }

        .top-action-bar .btn.danger .btn-text {
            font-weight: 700;
        }

        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .btn:disabled:hover {
            border-color: var(--border-standard);
            background: transparent;
            box-shadow: none;
        }

        .lock-banner {
            border: 1px solid var(--state-warn-border-standard);
            color: var(--state-warn-text-standard);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            display: none;
        }

        .lock-banner.show {
            display: block;
        }

        .filters {
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid var(--border-standard);
            background: var(--bg-panel);
            padding: 8px;
            border-radius: 8px;
            position: relative;
        }

        .filters-main-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: nowrap;
            min-width: 0;
        }

        /* 顶部筛选栏尺寸对齐外层 Emoji 标签按钮（32px 高，6px 间距） */
        .is-filter-panel-mode .filters-main-row {
            gap: 6px;
            min-height: 32px;
        }

        .is-filter-panel-mode .filters-main-row > .btn,
        .is-filter-panel-mode .filters-main-right .btn {
            height: 32px;
            min-height: 32px;
            padding: 6px 10px;
            font-size: 12px;
            line-height: 1.15;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .filters-main-right {
            margin-left: auto;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            flex: 0 0 auto;
        }

        .filters-main-right .btn {
            flex: 0 0 auto;
        }

        .keyword-field {
            flex: 1 1 auto;
            min-width: 0;
        }

        .keyword-field > input {
            flex: 1 1 auto;
            min-width: 0;
        }

        .filters-secondary-content {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            min-width: 0;
        }

        .filters-toolbar {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-left: auto;
        }

        .filter-panel-search {
            margin-left: 0;
            width: 100%;
            justify-content: stretch;
        }

        .filter-panel-search .btn {
            flex: 1 1 auto;
            width: 100%;
        }

        .cleanup-target-wrap {
            gap: 8px;
        }

        .cleanup-target-wrap > select {
            min-width: 140px;
            max-width: 200px;
        }

        .cleanup-all-toggle {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: var(--text-emphasis);
            font-size: 12px;
            white-space: nowrap;
        }

        .compact-cleanup-scope {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 2px 0;
        }

        .compact-cleanup-scope > select {
            flex: 1 1 auto;
            min-width: 120px;
        }

        .field {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .media-sort-field select {
            min-width: 92px;
        }

        .filter-action-field .btn {
            white-space: nowrap;
        }

        input,
        select {
            background: var(--surface-input);
            color: var(--text-standard);
            border: 1px solid var(--border-standard);
            border-radius: 6px;
            padding: 6px;
            transition: border-color 120ms ease, box-shadow 120ms ease;
        }

        input:not(.filter-invalid):hover,
        select:hover {
            border-color: var(--border-hover);
            box-shadow: none;
        }

        select:focus,
        select:focus-visible {
            outline: none;
            border-color: var(--border-active);
            box-shadow: none;
        }

        input.filter-invalid {
            border-color: var(--state-danger-border-standard) !important;
            box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--state-danger-border-standard) 40%, transparent);
        }

        .facet-field-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            min-width: 220px;
            width: 100%;
        }

        .facet-field-wrap.is-short {
            width: 106px;
            min-width: 106px;
            max-width: 106px;
        }

        .facet-input-shell {
            position: relative;
            width: 100%;
            min-width: 0;
        }

        .facet-field-wrap input {
            flex: 1 1 auto;
            min-width: 0;
            width: 100%;
            padding-right: 30px;
        }

        .facet-toggle-btn {
            position: absolute;
            top: 1px;
            right: 1px;
            bottom: 1px;
            width: 28px;
            border: 0;
            border-left: 1px solid var(--border-standard);
            border-radius: 0 6px 6px 0;
            background: var(--surface-input-toggle);
            color: var(--text-emphasis);
            padding: 0;
            line-height: 1;
            cursor: pointer;
            transition: color 120ms ease, background-color 120ms ease,
                border-color 120ms ease;
        }

        .facet-toggle-btn:hover {
            color: var(--text-active);
            background: rgba(var(--btn-hover-glow-rgb), 0.08);
            border-left-color: var(--border-hover);
        }

        .facet-menu {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            z-index: 14;
            max-height: none;
            overflow: visible;
            border: 1px solid var(--border-standard);
            border-radius: 8px;
            background: var(--surface-popup-main);
            padding: 4px;
            box-shadow: var(--shadow-popover);
        }

        .facet-option {
            display: block;
            width: 100%;
            text-align: left;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-standard);
            border-radius: 6px;
            padding: 6px 8px;
            cursor: pointer;
            transition: border-color 120ms ease, background-color 120ms ease,
                color 120ms ease, box-shadow 120ms ease;
        }

        .facet-option:hover {
            border-color: var(--border-hover);
            background: rgba(var(--btn-hover-glow-rgb), 0.1);
            box-shadow: var(--btn-hover-glow-soft);
        }

        .facet-option-all {
            border-bottom: 1px dashed var(--border-standard);
            margin-bottom: 4px;
        }

        .facet-empty {
            padding: 8px;
            color: var(--text-emphasis);
            font-size: 12px;
        }

        .facet-backdrop {
            position: fixed;
            inset: 0;
            z-index: 13;
            border: 0;
            background: transparent;
            margin: 0;
            padding: 0;
            cursor: default;
        }

        input[type="datetime-local"] {
            color-scheme: dark;
        }

        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            display: none;
            -webkit-appearance: none;
        }

        .datetime-field {
            display: inline-flex;
            align-items: center;
            width: 100%;
        }

        .date-input-shell {
            position: relative;
            width: 100%;
            min-width: 0;
        }

        .date-input-shell input[type="datetime-local"] {
            width: 100%;
            min-width: 0;
            padding-right: 30px;
        }

        .date-picker-btn {
            position: absolute;
            top: 1px;
            right: 1px;
            bottom: 1px;
            width: 28px;
            border: 0;
            border-left: 1px solid var(--border-standard);
            border-radius: 0 6px 6px 0;
            background: var(--surface-input);
            color: var(--text-emphasis);
            padding: 0;
            line-height: 1;
            cursor: pointer;
            transition: color 120ms ease, background-color 120ms ease,
                border-color 120ms ease;
        }

        .date-picker-btn:hover {
            color: var(--text-active);
            background: rgba(var(--btn-hover-glow-rgb), 0.08);
            border-left-color: var(--border-hover);
        }

        .date-picker-icon {
            width: 14px;
            height: 14px;
        }

        .filters-toolbar-shell.is-compact .filters-main-row > .btn,
        .filters-toolbar-shell.is-compact .filter-action-field,
        .filter-action-field .btn {
            white-space: nowrap;
        }

        .filters-toolbar-shell.is-compact .filters-main-row > .btn {
            flex: 0 0 auto;
        }

        .filters-overflow-panel .filters-secondary-content {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 8px;
            min-width: 0;
        }

        .filters-overflow-panel .field {
            width: 100%;
            flex-wrap: nowrap;
            align-items: center;
            min-width: 0;
        }

        .filters-overflow-panel .field > span {
            flex: 0 0 auto;
            white-space: nowrap;
        }

        .field-pair-row {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
            gap: 8px;
            width: 100%;
        }

        .field-pair-row > .field {
            min-width: 0;
            flex: 0 1 auto;
        }

        .filters-overflow-panel .filters-toolbar {
            width: 100%;
            margin-left: 0;
        }

        .filters-overflow-panel .filters-toolbar .btn {
            flex: 1 1 auto;
        }

        .filters-overflow-panel .facet-field-wrap,
        .filters-overflow-panel .date-range-wrap,
        .filters-overflow-panel .media-sort-field {
            width: 100%;
            min-width: 0;
        }

        .filters-overflow-panel .media-sort-field select {
            min-width: 0;
            flex: 1 1 auto;
        }

        .compact-actions-menu {
            position: absolute;
            top: calc(100% - 6px);
            left: 8px;
            right: auto;
            z-index: 12;
            width: min(350px, calc(100% - 16px));
            border: 1px solid var(--border-standard);
            border-radius: 8px;
            background: var(--surface-popup-main);
            padding: 8px;
            box-shadow: var(--shadow-popover);
            box-sizing: border-box;
            max-height: min(70vh, 520px);
            overflow: auto;
        }

        .compact-actions-backdrop {
            position: fixed;
            inset: 0;
            z-index: 11;
            border: 0;
            background: transparent;
            margin: 0;
            padding: 0;
            cursor: default;
        }

        .date-range-wrap {
            position: relative;
            display: block;
        }

        .date-range-toggle {
            white-space: nowrap;
        }

        .date-range-toggle.active {
            border-color: var(--border-active);
            color: var(--text-active);
            box-shadow: var(--btn-hover-glow);
        }

        .date-range-toggle:not(:disabled):not(.active):hover {
            border-color: var(--border-hover);
            background: rgba(var(--btn-hover-glow-rgb), 0.08);
            box-shadow: var(--btn-hover-glow-soft);
        }

        .date-range-panel {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            z-index: 13;
            width: fit-content;
            min-width: 290px;
            border: 1px solid var(--border-standard);
            border-radius: 8px;
            background: var(--surface-popup-main);
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: var(--shadow-popover);
            display: none;
        }

        .date-range-backdrop {
            position: fixed;
            inset: 0;
            z-index: 12;
            border: 0;
            background: transparent;
            margin: 0;
            padding: 0;
            cursor: default;
            display: none;
        }

        .date-range-panel.show {
            display: flex;
        }

        .date-range-backdrop.show {
            display: block;
        }

        .danger-dialog-overlay.is-hidden {
            display: none;
        }

        .body {
            flex: 1;
            min-height: 0;
            display: flex;
            gap: 8px;
        }

        .workspace {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
            position: relative;
            background: var(--workspace-bg);
        }

        .workspace-main {
            flex: 1 1 auto;
            min-width: 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .media-body {
            display: block;
        }

        .panel {
            border: 1px solid var(--border-standard);
            background: var(--bg-panel);
            border-radius: 8px;
            min-height: 0;
        }

        .list-panel {
            width: 45%;
            display: flex;
            flex-direction: column;
        }

        .history-list-panel {
            min-width: 0;
            height: 100%;
        }

        .history-list-panel.collapsed-fill {
            width: 100% !important;
            flex: 1 1 auto;
        }

        .history-list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 8px;
            margin-bottom: 2px;
            border-bottom: 1px solid var(--border-standard);
            background: var(--theme-bg-main);
        }

        .history-list-header.compact {
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 8px;
            margin-bottom: 0;
            background: var(--theme-bg-main);
        }

        .history-list-header-meta {
            min-width: 0;
            flex: 1 1 auto;
            color: var(--text-emphasis);
            font-size: 12px;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-list-header-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            flex: 0 0 auto;
        }

        .history-list-header-left {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex: 0 0 auto;
        }

        .top-action-bar .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
        }

        .top-action-bar .btn-emoji {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 1.2em;
            width: 1.2em;
            line-height: 1;
        }

        .top-action-bar .btn-emoji .btn-icon {
            width: 1.05em;
            height: 1.05em;
        }

        .top-action-bar .btn-text {
            display: inline;
        }

        .history-list-header.compact.top-action-bar {
            padding: 4px 0;
            border-left: 0;
            border-right: 0;
            border-bottom: 0;
            background: var(--top-action-bar-bg);
            background-color: var(--top-action-bar-bg);
        }

        .history-list-header.compact.top-action-bar.compact-icons {
            display: grid;
            grid-template-columns: repeat(var(--top-action-count, 4), minmax(0, 1fr));
            align-items: stretch;
            gap: 6px;
            padding: 4px 0;
        }

        .top-action-bar.compact-icons .history-list-header-left,
        .top-action-bar.compact-icons .history-list-header-actions {
            display: contents;
        }

        .top-action-bar.compact-icons .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            min-width: 0;
            height: 33px;
            min-height: 33px;
            box-sizing: border-box;
            border-width: 1px !important;
            padding: 6px;
            gap: 0;
            font-size: inherit;
            font-weight: 700;
            line-height: normal;
        }

        .top-action-bar.compact-icons .btn-text {
            display: none;
        }

        .top-action-bar.compact-icons .btn-emoji {
            position: absolute;
            left: 50%;
            top: 50%;
            display: block;
            font-size: 14px;
            transform: translate(-50%, -50%);
            line-height: 1;
            margin: 0;
        }

        .top-action-bar.compact-icons .btn.danger,
        .top-action-bar.compact-icons .btn.primary,
        .top-action-bar.compact-icons .btn.success,
        .top-action-bar.compact-icons .btn.warn,
        .top-action-bar.compact-icons .btn.active {
            border-width: 1px !important;
        }

        .media-toolbar {
            padding: 8px;
            margin-bottom: 0;
        }

        .filters-topbar {
            width: 100%;
            flex: 0 0 auto;
            max-height: min(52vh, calc(100vh - 180px));
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-gutter: stable;
        }

        .filters-sidebar {
            width: 100%;
            flex: 0 0 auto;
            min-width: 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-gutter: stable;
        }

        .filters-sidebar.collapsed {
            width: 0;
            flex-basis: 0;
            padding: 0;
            border: 0;
        }

        .filters-sidebar-body {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
            overflow: visible;
            padding-right: 2px;
        }

        .filters-topbar .field,
        .filters-sidebar .field {
            width: 100%;
            flex-wrap: nowrap;
            align-items: center;
        }

        .filters-topbar .field > span,
        .filters-sidebar .field > span {
            flex: 0 0 auto;
            white-space: nowrap;
        }

        .filters-topbar .facet-field-wrap,
        .filters-topbar .date-range-wrap,
        .filters-topbar .media-sort-field,
        .filters-sidebar .facet-field-wrap,
        .filters-sidebar .date-range-wrap,
        .filters-sidebar .media-sort-field {
            width: 100%;
            min-width: 0;
        }

        .filters-topbar .media-sort-field select,
        .filters-sidebar .media-sort-field select {
            min-width: 0;
            flex: 1 1 auto;
        }

        .filters-sidebar-footer {
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px solid var(--border-standard);
            padding-top: 8px;
        }

        .filters-sidebar-footer:empty {
            display: none;
            border-top: 0;
            padding-top: 0;
        }

        .filters-sidebar-actions {
            margin-left: 0;
            width: 100%;
            justify-content: flex-start;
        }

        .list {
            flex: 1;
            min-height: 0;
            overflow: auto;
