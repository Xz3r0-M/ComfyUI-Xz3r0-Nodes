<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XDataHub 数据浏览</title>
    <style>
        :root {
            /* 颜色变量总入口：
               1) 任何新增颜色必须先在此区域定义变量（或复用现有变量）。
               2) 业务样式中禁止直接写硬编码颜色。 */

            /* 基础背景/表面 */
            --theme-bg-main: var(--comfy-input-bg, #252525); /* 主题背景主色（主要区域） */
            --bg: var(--comfy-menu-bg, #1e1e1e);
            --bg-panel: var(--theme-bg-main);
            --surface-input: #1a1a1a;
            --surface-input-toggle: #1a1a1a;
            --surface-elevated: #171a22;
            --surface-media-void: var(--theme-bg-main);
            --surface-media-card: var(--theme-bg-main);
            --surface-media-card-hover: color-mix(
                in srgb,
                var(--theme-bg-main) 92%,
                var(--surface-black) 8%
            );
            --surface-media-card-glow-end: color-mix(
                in srgb,
                var(--theme-bg-main) 95%,
                var(--surface-black) 5%
            );
            --surface-video-shell: #0d1016;
            --surface-preview: #111111;
            --surface-black: var(--theme-bg-main);
            --surface-black-soft: #111111;
            --surface-popup-main: var(--theme-bg-main);
            --surface-popup-soft: color-mix(
                in srgb,
                var(--theme-bg-main) 92%,
                var(--surface-black) 8%
            );
            --surface-transparent: transparent;
            --workspace-bg: var(--surface-transparent);
            --top-action-bar-bg: var(--surface-transparent);
            --app-shell-padding: 4px 8px 8px 8px;

            /* 文本颜色 */
            --text: var(--input-text, #f4f4f4);
            --text-dim: #bdbdbd;
            --text-light-strong: #f1f5ff;
            --text-light-soft: #f4f8ff;
            --text-danger-soft: #ff9c9c;
            --text-danger: #ffacac;
            --text-warn: #f1cd82;
            --text-db-danger: #ffacac;
            --text-db-warn: #f1cd82;
            --folder-kind-text: var(--text-light-soft);

            /* 基础边框/填充/渐变（中性层） */
            --border: var(--border-color, #3d3d3d);
            --line-surface-soft: rgba(255, 255, 255, 0.08);
            --line-surface-muted: rgba(255, 255, 255, 0.18);
            --line-white-08: rgba(255, 255, 255, 0.08);
            --line-white-18: rgba(255, 255, 255, 0.18);
            --line-spinner-track: rgba(255, 255, 255, 0.18);
            --fill-surface-soft: rgba(255, 255, 255, 0.02);
            --fill-surface-muted: rgba(255, 255, 255, 0.03);
            --fill-surface-strong: rgba(255, 255, 255, 0.04);
            --row-content-bg: var(--bg);
            --row-content-border: color-mix(
                in srgb,
                var(--border) 74%,
                var(--fill-white-14) 26%
            );
            --row-content-bg-hover: var(--bg);
            --row-content-bg-active: var(--bg);
            --fill-white-02: rgba(255, 255, 255, 0.02);
            --fill-white-03: rgba(255, 255, 255, 0.03);
            --fill-white-04: rgba(255, 255, 255, 0.04);
            --fill-white-14: rgba(255, 255, 255, 0.14);
            --fill-white-24: rgba(255, 255, 255, 0.24);
            --gradient-white-52: rgba(255, 255, 255, 0.52);
            --gradient-white-24: rgba(255, 255, 255, 0.24);

            /* 品牌/状态语义色 */
            --accent: #4fa3ff;
            --btn-active-color: #ff69b4;
            --danger: #d25555;
            --ok: #59b36f;
            --warn: #d5a12f;
            --accent-rgb: 79, 163, 255;
            --danger-rgb: 210, 85, 85;
            --warn-rgb: 213, 161, 47;

            /* 交互发光效果 */
            --btn-hover-glow-rgb: 255, 105, 180;
            --btn-hover-glow-soft: 0 0 0 1px
                rgba(var(--btn-hover-glow-rgb), 0.16);
            --btn-hover-glow: 0 0 0 1px
                rgba(var(--btn-hover-glow-rgb), 0.24),
                0 0 12px rgba(var(--btn-hover-glow-rgb), 0.22);
            --btn-hover-glow-strong: 0 0 0 1px
                rgba(var(--btn-hover-glow-rgb), 0.22),
                0 0 12px rgba(var(--btn-hover-glow-rgb), 0.16);
            --btn-press-glow-inset: inset 0 0 0 1px
                rgba(var(--btn-hover-glow-rgb), 0.3);

            /* 遮罩与弹层 */
            --overlay-dialog: rgba(6, 8, 12, 0.6);
            --overlay-lightbox: rgba(8, 10, 14, 0.72);
            --overlay-drawer: rgba(8, 10, 14, 0.45);
            --lightbox-shell-bg: var(--surface-popup-main);
            --lightbox-head-bg: var(--surface-popup-soft);
            --lightbox-body-bg: var(--surface-popup-soft);
            --lightbox-close-bg: rgba(18, 24, 34, 0.94);
            --lightbox-close-bg-hover: rgba(26, 34, 48, 0.96);

            /* 阴影 */
            --shadow-drop: 0 3px 8px rgba(0, 0, 0, 0.35);
            --shadow-popover: 0 10px 28px rgba(0, 0, 0, 0.45);
            --shadow-dialog: 0 14px 34px rgba(0, 0, 0, 0.45);
            --shadow-dialog-strong: 0 16px 36px rgba(0, 0, 0, 0.5);
            --shadow-button-elevated: 0 2px 10px rgba(0, 0, 0, 0.35);
            --shadow-button-elevated-hover: 0 6px 18px rgba(0, 0, 0, 0.38);

            /* 滚动条 */
            --scrollbar-size: 12px;
            --scrollbar-track: color-mix(
                in srgb,
                var(--surface-black-soft) 82%,
                var(--surface-elevated) 18%
            );
            --scrollbar-thumb: color-mix(
                in srgb,
                var(--border) 72%,
                var(--fill-white-14) 28%
            );
            --scrollbar-thumb-hover: color-mix(
                in srgb,
                var(--btn-active-color) 42%,
                var(--border) 58%
            );
            --scrollbar-thumb-active: color-mix(
                in srgb,
                var(--btn-active-color) 58%,
                var(--border) 42%
            );
            --scrollbar-corner: transparent;

            /* 图标滤镜 */
            --icon-filter-unified: brightness(0) saturate(100%) invert(80%)
                sepia(9%) saturate(289%) hue-rotate(182deg)
                brightness(91%) contrast(88%);
            --icon-filter-folder: brightness(0) saturate(100%) invert(89%)
                sepia(71%) saturate(1401%) hue-rotate(339deg)
                brightness(101%) contrast(104%);
            --icon-db-mask-url: url("/extensions/ComfyUI-Xz3r0-Nodes/icons/database.svg");

            /* 文件夹缩略图专用 */
            --folder-thumb-grad-start: color-mix(
                in srgb,
                var(--theme-bg-main) 92%,
                var(--surface-black) 8%
            );
            --folder-thumb-grad-end: color-mix(
                in srgb,
                var(--theme-bg-main) 84%,
                var(--surface-black) 16%
            );

            /* 数据库清理危险状态 */
            --db-critical-danger-bg: rgba(var(--danger-rgb), 0.14);
            --db-critical-warn-bg: rgba(var(--warn-rgb), 0.14);
            --db-critical-danger-hover-bg: rgba(var(--danger-rgb), 0.1);
            --db-critical-warn-hover-bg: rgba(var(--warn-rgb), 0.1);
            --db-critical-danger-inset: inset 0 0 0 1px rgba(var(--danger-rgb), 0.2);
            --db-critical-warn-inset: inset 0 0 0 1px rgba(var(--warn-rgb), 0.2);

            /* DB 名称轮盘色 */
            --db-accent-default: hsl(212, 10%, 52%);
            --db-accent-01: hsl(8, 74%, 62%);
            --db-accent-02: hsl(24, 78%, 60%);
            --db-accent-03: hsl(46, 76%, 60%);
            --db-accent-04: hsl(88, 68%, 56%);
            --db-accent-05: hsl(132, 62%, 54%);
            --db-accent-06: hsl(172, 68%, 55%);
            --db-accent-07: hsl(198, 76%, 60%);
            --db-accent-08: hsl(218, 74%, 62%);
            --db-accent-09: hsl(258, 68%, 64%);
            --db-accent-10: hsl(292, 66%, 62%);
            --db-accent-11: hsl(324, 70%, 60%);
            --db-accent-12: hsl(352, 72%, 61%);
        }

        * {
            box-sizing: border-box;
            scrollbar-width: auto;
            scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
        }

        *::-webkit-scrollbar {
            width: var(--scrollbar-size);
            height: var(--scrollbar-size);
        }

        *::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
            border-radius: 999px;
        }

        *::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border: 2px solid var(--scrollbar-track);
            border-radius: 999px;
            min-height: 34px;
        }

        *::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-thumb-hover);
        }

        *::-webkit-scrollbar-thumb:active {
            background: var(--scrollbar-thumb-active);
        }

        *::-webkit-scrollbar-corner {
            background: var(--scrollbar-corner);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: 14px;
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            gap: 8px;
            padding: var(--app-shell-padding);
        }

        .tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            border-radius: 6px;
            padding: 6px 10px;
            font-weight: 700;
            cursor: pointer;
            transition: border-color 120ms ease, background-color 120ms ease,
                color 120ms ease, box-shadow 120ms ease;
        }

        .tab-btn:not(.active):hover {
            border-color: color-mix(in srgb, var(--accent) 48%, var(--border) 52%);
            background: rgba(var(--accent-rgb), 0.08);
        }

        .tab-btn.active {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn {
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            border-radius: 6px;
            padding: 6px 10px;
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
            transition: border-color 120ms ease, background-color 120ms ease,
                color 120ms ease, box-shadow 120ms ease;
        }

        .btn .btn-emoji {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .btn .btn-text {
            display: inline;
        }

        .xdatahub-icon {
            width: 1em;
            height: 1em;
            display: inline-block;
            vertical-align: middle;
            filter: var(--icon-filter-unified);
        }

        .btn:not(:disabled):not(.active):hover {
            border-color: color-mix(
                in srgb,
                var(--btn-active-color) 46%,
                var(--border) 54%
            );
            background: rgba(var(--btn-hover-glow-rgb), 0.08);
            box-shadow: var(--btn-hover-glow-soft);
        }

        .btn.primary {
            border-color: var(--border);
            color: var(--text);
        }

        .btn.success {
            border-color: var(--border);
            color: var(--text);
        }

        .btn.warn {
            border-color: var(--border);
            color: var(--text);
        }

        .btn.active {
            border-color: var(--btn-active-color);
            color: var(--btn-active-color);
            box-shadow: var(--btn-hover-glow);
            background: rgba(var(--btn-hover-glow-rgb), 0.1);
        }

        .search-btn {
            transition: transform 120ms ease, box-shadow 120ms ease,
                border-color 120ms ease, background-color 120ms ease,
                color 120ms ease;
        }

        .search-btn:not(:disabled):not(.clicked):hover {
            border-color: color-mix(
                in srgb,
                var(--btn-active-color) 56%,
                var(--text-light-strong) 44%
            );
            background: rgba(var(--btn-hover-glow-rgb), 0.12);
            box-shadow: var(--btn-hover-glow-strong);
        }

        .search-btn:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: var(--btn-press-glow-inset);
        }

        .search-btn.clicked {
            border-color: var(--btn-active-color);
            color: var(--btn-active-color);
            box-shadow: var(--btn-hover-glow);
            background: rgba(var(--btn-hover-glow-rgb), 0.14);
        }

        .btn.danger {
            border-color: var(--border);
            color: var(--text);
        }

        .top-action-bar .btn.danger .btn-text {
            font-weight: 700;
        }

        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .btn:disabled:hover {
            border-color: var(--border);
            background: transparent;
            box-shadow: none;
        }

        .lock-banner {
            border: 1px solid var(--warn);
            color: var(--warn);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            display: none;
        }

        .lock-banner.show {
            display: block;
        }

        .filters {
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid var(--border);
            background: var(--bg-panel);
            padding: 8px;
            border-radius: 8px;
            position: relative;
        }

        .filters-main-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: nowrap;
            min-width: 0;
        }

        /* 顶部筛选栏尺寸对齐外层 Emoji 标签按钮（32px 高，6px 间距） */
        .is-filter-panel-mode .filters-main-row {
            gap: 6px;
            min-height: 32px;
        }

        .is-filter-panel-mode .filters-main-row > .btn,
        .is-filter-panel-mode .filters-main-right .btn {
            height: 32px;
            min-height: 32px;
            padding: 6px 10px;
            font-size: 12px;
            line-height: 1.15;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .filters-main-right {
            margin-left: auto;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            flex: 0 0 auto;
        }

        .filters-main-right .btn {
            flex: 0 0 auto;
        }

        .keyword-field {
            flex: 1 1 auto;
            min-width: 0;
        }

        .keyword-field > input {
            flex: 1 1 auto;
            min-width: 0;
        }

        .filters-secondary-content {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            min-width: 0;
        }

        .filters-toolbar {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-left: auto;
        }

        .filter-panel-search {
            margin-left: 0;
            width: 100%;
            justify-content: stretch;
        }

        .filter-panel-search .btn {
            flex: 1 1 auto;
            width: 100%;
        }

        .cleanup-target-wrap {
            gap: 8px;
        }

        .cleanup-target-wrap > select {
            min-width: 140px;
            max-width: 200px;
        }

        .cleanup-all-toggle {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: var(--text-dim);
            font-size: 12px;
            white-space: nowrap;
        }

        .compact-cleanup-scope {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 2px 0;
        }

        .compact-cleanup-scope > select {
            flex: 1 1 auto;
            min-width: 120px;
        }

        .field {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .media-sort-field select {
            min-width: 92px;
        }

        .filter-action-field .btn {
            white-space: nowrap;
        }

        input,
        select {
            background: var(--surface-input);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px;
            transition: border-color 120ms ease, box-shadow 120ms ease;
        }

        input:not(.filter-invalid):hover,
        select:hover {
            border-color: var(--border);
            box-shadow: none;
        }

        select:focus,
        select:focus-visible {
            outline: none;
            border-color: var(--border);
            box-shadow: none;
        }

        input.filter-invalid {
            border-color: var(--danger) !important;
            box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--danger) 40%, transparent);
        }

        .facet-field-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            min-width: 220px;
            width: 100%;
        }

        .facet-field-wrap.is-short {
            width: 106px;
            min-width: 106px;
            max-width: 106px;
        }

        .facet-input-shell {
            position: relative;
            width: 100%;
            min-width: 0;
        }

        .facet-field-wrap input {
            flex: 1 1 auto;
            min-width: 0;
            width: 100%;
            padding-right: 30px;
        }

        .facet-toggle-btn {
            position: absolute;
            top: 1px;
            right: 1px;
            bottom: 1px;
            width: 28px;
            border: 0;
            border-left: 1px solid var(--border);
            border-radius: 0 6px 6px 0;
            background: var(--surface-input-toggle);
            color: var(--text-dim);
            padding: 0;
            line-height: 1;
            cursor: pointer;
            transition: color 120ms ease, background-color 120ms ease,
                border-color 120ms ease;
        }

        .facet-toggle-btn:hover {
            color: var(--btn-active-color);
            background: rgba(var(--btn-hover-glow-rgb), 0.08);
            border-left-color: color-mix(
                in srgb,
                var(--btn-active-color) 35%,
                var(--border) 65%
            );
        }

        .facet-menu {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            z-index: 14;
            max-height: none;
            overflow: visible;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface-popup-main);
            padding: 4px;
            box-shadow: var(--shadow-popover);
        }

        .facet-option {
            display: block;
            width: 100%;
            text-align: left;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text);
            border-radius: 6px;
            padding: 6px 8px;
            cursor: pointer;
            transition: border-color 120ms ease, background-color 120ms ease,
                color 120ms ease, box-shadow 120ms ease;
        }

        .facet-option:hover {
            border-color: color-mix(
                in srgb,
                var(--btn-active-color) 38%,
                var(--border) 62%
            );
            background: rgba(var(--btn-hover-glow-rgb), 0.1);
            box-shadow: var(--btn-hover-glow-soft);
        }

        .facet-option-all {
            border-bottom: 1px dashed var(--border);
            margin-bottom: 4px;
        }

        .facet-empty {
            padding: 8px;
            color: var(--text-dim);
            font-size: 12px;
        }

        .facet-backdrop {
            position: fixed;
            inset: 0;
            z-index: 13;
            border: 0;
            background: transparent;
            margin: 0;
            padding: 0;
            cursor: default;
        }

        input[type="datetime-local"] {
            color-scheme: dark;
        }

        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            display: none;
            -webkit-appearance: none;
        }

        .datetime-field {
            display: inline-flex;
            align-items: center;
            width: 100%;
        }

        .date-input-shell {
            position: relative;
            width: 100%;
            min-width: 0;
        }

        .date-input-shell input[type="datetime-local"] {
            width: 100%;
            min-width: 0;
            padding-right: 30px;
        }

        .date-picker-btn {
            position: absolute;
            top: 1px;
            right: 1px;
            bottom: 1px;
            width: 28px;
            border: 0;
            border-left: 1px solid var(--border);
            border-radius: 0 6px 6px 0;
            background: var(--surface-input);
            color: var(--text-dim);
            padding: 0;
            line-height: 1;
            cursor: pointer;
            transition: color 120ms ease, background-color 120ms ease,
                border-color 120ms ease;
        }

        .date-picker-btn:hover {
            color: var(--btn-active-color);
            background: rgba(var(--btn-hover-glow-rgb), 0.08);
            border-left-color: color-mix(
                in srgb,
                var(--btn-active-color) 40%,
                var(--border) 60%
            );
        }

        .date-picker-icon {
            width: 14px;
            height: 14px;
        }

        .filters-toolbar-shell.is-compact .filters-main-row > .btn,
        .filters-toolbar-shell.is-compact .filter-action-field,
        .filter-action-field .btn {
            white-space: nowrap;
        }

        .filters-toolbar-shell.is-compact .filters-main-row > .btn {
            flex: 0 0 auto;
        }

        .filters-overflow-panel .filters-secondary-content {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 8px;
            min-width: 0;
        }

        .filters-overflow-panel .field {
            width: 100%;
            flex-wrap: nowrap;
            align-items: center;
            min-width: 0;
        }

        .filters-overflow-panel .field > span {
            flex: 0 0 auto;
            white-space: nowrap;
        }

        .field-pair-row {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
            gap: 8px;
            width: 100%;
        }

        .field-pair-row > .field {
            min-width: 0;
            flex: 0 1 auto;
        }

        .filters-overflow-panel .filters-toolbar {
            width: 100%;
            margin-left: 0;
        }

        .filters-overflow-panel .filters-toolbar .btn {
            flex: 1 1 auto;
        }

        .filters-overflow-panel .facet-field-wrap,
        .filters-overflow-panel .date-range-wrap,
        .filters-overflow-panel .media-sort-field {
            width: 100%;
            min-width: 0;
        }

        .filters-overflow-panel .media-sort-field select {
            min-width: 0;
            flex: 1 1 auto;
        }

        .compact-actions-menu {
            position: absolute;
            top: calc(100% - 6px);
            left: 8px;
            right: auto;
            z-index: 12;
            width: min(350px, calc(100% - 16px));
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface-popup-main);
            padding: 8px;
            box-shadow: var(--shadow-popover);
            box-sizing: border-box;
            max-height: min(70vh, 520px);
            overflow: auto;
        }

        .compact-actions-backdrop {
