<!--
    XMetadataWorkflow - ComfyUI 工作流元数据查看器
    ================================================

    功能概述:
    ---------
    一个独立的网页工具，用于查看和分析 ComfyUI 工作流元数据，无需启动 ComfyUI 即可预览工作流结构。

    支持的文件格式:
    ---------------
    - PNG 图片 (.png) - 包含工作流元数据的生成图片
    - Latent 潜空间文件 (.latent) - 包含 __metadata__ 的潜空间文件
    - JSON 工作流文件 (.json) - 支持三种格式：
        * XWorkflowSave 生成的格式 (包含 prompt 字段，支持 merge 模式)
        * ComfyUI 网页导出的 API 格式 (直接是 prompt 数据)
        * ComfyUI 网页保存的完整 Workflow 格式 (包含 nodes 和 links 数组)

    核心功能:
    ---------
    1. 文件解析:
       - PNG: 从 tEXt/iTXt chunk 读取 prompt/workflow 元数据
       - Latent: 从文件头部 JSON 读取 __metadata__
       - JSON: 智能识别并解析三种工作流格式
       - Merge 模式: 自动合并 prompt 和 full_workflow 数据，保留执行结果和完整结构

    2. 工作流可视化:
       - 自动层级布局算法排列节点
       - 优先使用保存的节点位置信息（如果可用）
       - 显示节点类型、参数和连接关系
       - 子图自动识别和颜色标记 (ID格式: "子图ID:节点ID")
       - 选中节点发光效果（基于子图颜色）
       - 连接点圆点显示（输入在左侧，输出在右侧）
       - 支持缩放、平移、自适应视图

    3. 交互功能:
       - 折叠/展开节点参数
       - 单击选中节点，高亮相关连接（带流动动画效果）
       - 多选节点: Ctrl+点击 或 框选(Ctrl+拖拽)
       - 节点拖拽重新布局（支持多节点同时拖拽）
       - 节点大小调整: 8个方向拉伸控制点（角+边）
       - 画布平移: 鼠标空白处拖拽 或 中键拖拽
       - 滚轮缩放，以鼠标位置为中心
       - 复制节点名称: 点击标题栏左侧 📋 按钮，快速复制节点类型名称到剪贴板

    4. 界面特性:
       - 支持暗黑/亮色主题切换（本地存储记忆）
       - 支持中英文语言切换（本地存储记忆）
       - 侧边栏折叠/展开功能（默认展开，不持久化）
       - 文件信息预览面板（图片预览、Latent标识）
       - 缩放控制: 按钮、输入框精确设置、适应窗口
       - 虚拟滚动: 长文本参数使用虚拟滚动优化性能
       - 长文本操作: 一键复制、下载为文件
       - Toast 提示: 操作反馈（复制成功、下载开始等）

    5. 特殊节点处理:
       - XWorkflowSave 节点识别和标记
       - Note/MarkdownNote 节点特殊显示
       - Bypass 节点状态显示

    数据格式说明:
    -------------
    - 内部统一使用 prompt 格式 (ComfyUI API 格式)
    - 完整 Workflow 格式会自动转换为 Prompt API 格式
    - Merge 模式: 合并 prompt（执行结果）和 full_workflow（完整结构）数据
    - 节点位置优先使用 workflow 中保存的原始位置
    - 子图通过节点 ID 中的 ":" 识别 (如 "18:8" 表示子图18中的节点8)

    技术栈:
    -------
    - 纯前端实现，无需后端服务
    - 原生 JavaScript (ES6+)
    - SVG 绘制连接线和连接点
    - CSS3 动画效果（流动线条、发光效果）
    - ResizeObserver 监听节点尺寸变化

    性能优化:
    ---------
    - 虚拟滚动: 长文本内容分段渲染
    - ResizeObserver: 及时清理防止内存泄漏
    - Object URL 管理: 及时释放预览图片内存

    作者: Xz3r0
    项目: ComfyUI-Xz3r0-Nodes
    许可证: MIT License
-->

<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XMetadataWorkflow</title>
    <style>

            --bg-preview: #e0e0e0;
            --bg-node: #ffffff;
            --bg-node-header: #ffffff;
            --bg-param-key: #e0e0e0;
            --bg-param-value: #e0e0e0;
            --bg-note: #f8f0f0;
            --bg-btn: #ffffff;
            --bg-btn-hover: #e0e0e0;
            --bg-latent-badge: #e0e8f0;

            --border-primary: #ddd;
            --border-secondary: #ccc;
            --border-tertiary: #bbb;
            --border-param: #e0e0e0;

            --text-primary: #1a1a1a;
            --text-secondary: #1a1a1a;
            --text-tertiary: #1a1a1a;
            --text-muted: #1a1a1a;
            --text-dim: #1a1a1a;
            --text-placeholder: #1a1a1a;
            --text-hint: #1a1a1a;
            --text-file-placeholder: #1a1a1a;

            --accent-hover: rgba(255, 105, 180, 0.1);

            background: var(--bg-primary);
            color: var(--text-secondary);

        .sidebar {

            border-right: 1px solid var(--border-primary);

            flex-direction: column;

            border: 1px solid var(--border-primary);

            transition: transform 0.3s ease;

        .sidebar.collapsed + .sidebar-toggle {

        }

        .sidebar.collapsed + .sidebar-toggle .toggle-icon {
            transform: rotate(180deg);
        }

        .sidebar-header {
            padding: 12px 15px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-primary);

        .lang-btn {

            border: 1px solid var(--border-primary);
            background: var(--bg-tertiary);
            color: var(--text-muted);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;

            color: var(--accent);

            padding: 10px 15px;
            border-top: 1px solid var(--border-primary);
            gap: 8px;
            justify-content: center;
        }

        .theme-btn {
            padding: 6px 12px;
            border: 1px solid var(--border-primary);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .theme-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .theme-btn.active {
            border-color: var(--accent);
            color: var(--accent);

        }

        .theme-btn[data-theme="dark"]:not(.active) {
            background: #1a1a1a;
            border-color: #1a1a1a;
            color: #fff;
        }

        .theme-btn[data-theme="dark"].active {
            background: #1a1a1a;
            border-color: var(--accent);
            color: var(--accent);
        }

        .theme-btn[data-theme="light"]:not(.active) {
            background: #ffffff;
            border-color: #ffffff;
            color: #1a1a1a;
        }

        .theme-btn[data-theme="light"].active {
            background: #ffffff;
            border-color: var(--accent);
            color: var(--accent);
        }

        .file-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 15px;
        }

        .file-area .file-input {
            display: none;
        }

        .file-area .file-preview {
            width: 100%;
            aspect-ratio: 1;
            background: var(--bg-preview);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid var(--border-primary);
        }

        .file-area .file-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .file-area .file-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-file-placeholder);
            cursor: pointer;
            padding: 20px;
            width: 100%;
            height: 100%;
            border: 2px dashed transparent;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .file-area .file-placeholder:hover {
            border-color: var(--accent);
            background: var(--accent-hover);
        }

        .file-area .file-placeholder .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .file-area .file-placeholder span {
            font-size: 12px;
            white-space: pre-line;
            text-align: center;
        }

        .file-area .file-placeholder .hint {
            font-size: 10px;
            color: var(--text-hint);
            margin-top: 4px;
        }

        .file-area .file-placeholder .file-placeholder-hint {
            font-size: 10px;
            color: var(--text-file-placeholder);
            margin-top: 4px;
        }

        .file-area .file-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file-area .file-info-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            font-size: 11px;
        }

        .file-area .file-info-item .label {
            color: var(--text-dim);
            flex-shrink: 0;
        }

        .file-area .file-info-item .value {
            color: var(--text-tertiary);
            text-align: right;
            word-break: break-all;
            margin-left: 10px;
        }

        .file-area .file-info-item .value.latent-badge {
            display: inline-block;
            background: var(--bg-latent-badge);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
        }

        /* 转换按钮样式 */
        .convert-section {
            padding: 15px;
            border-top: 1px solid var(--border-primary);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .convert-btn {
            padding: 10px 15px;
            border: 1px solid var(--border-primary);
            background: var(--bg-tertiary);
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .convert-btn:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--bg-tertiary);
        }

        .convert-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .convert-btn.active {
            background: var(--bg-tertiary);
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        .convert-status {
            font-size: 11px;
            color: var(--text-dim);
            text-align: center;
            min-height: 16px;
        }

        .main-container {
            display: flex;
            height: 100vh;
        }

        /* 顶边栏浮动样式 */
        .canvas-wrapper-with-topbar {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .topbar-float {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-top: none;
            border-radius: 0 0 12px 12px;
            padding: 12px 26px 16px 26px;
            height: 130px;
            box-sizing: border-box;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .topbar-float.collapsed {
            opacity: 0;
            transform: translateX(-50%) translateY(-100%);
            pointer-events: none;
        }

        .topbar-float-title {
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 1px;
            height: 16px;
            line-height: 16px;
            overflow: hidden;
        }

        .topbar-float-content {
            display: flex;
            gap: 12px;
            height: 74px;
        }

        .topbar-mode-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 8px 12px;
            border: 1px solid var(--border-primary);
            background: var(--bg-tertiary);
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            width: 130px;
            flex: 0 0 130px;
            height: 74px;
            box-sizing: border-box;
        }

        .topbar-mode-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--bg-tertiary);
        }

        .topbar-mode-btn.active {
            background: var(--bg-tertiary);
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        .topbar-mode-btn-main {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .topbar-mode-btn .mode-icon {
            font-size: 14px;
        }

        .topbar-mode-btn .mode-title {
            font-weight: 500;
            font-size: 13px;
        }

        .topbar-mode-btn .mode-desc {
            font-size: 10px;
            opacity: 0.8;
            color: var(--text-muted);
        }

        /* 顶边栏折叠按钮 */
        .topbar-float-toggle {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            width: 48px;
            height: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-top: none;
            border-radius: 0 0 8px 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 10px;
            transition: all 0.3s ease;
            margin-top: 0;
        }

        .topbar-float-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .topbar-float-toggle .toggle-icon {
            transition: transform 0.3s ease;
        }

        /* 当顶边栏显示时，折叠按钮位置固定 */
        .topbar-float:not(.collapsed) ~ .topbar-float-toggle {
            top: 130px;
        }

        /* 当顶边栏折叠时，箭头旋转 */
        .topbar-float.collapsed ~ .topbar-float-toggle .toggle-icon {
            transform: rotate(180deg);
        }

        .canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: var(--bg-canvas);
            background-image:
                radial-gradient(circle, var(--dot-pattern) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        #canvas-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-origin: 0 0;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        .svg-connections {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
            overflow: visible;
        }

        .connection-line {
            stroke: var(--connection-line);
            stroke-width: 2;
            fill: none;
            transition: all 0.3s ease;
        }

        .connection-line.highlight {
            stroke: var(--accent);
            stroke-width: 3;
            animation: line-flow 1.5s linear infinite;
        }

        .connection-line-base {
            stroke: var(--connection-line);
            stroke-width: 2;
            fill: none;
        }

        .connection-line-flow {
            stroke: var(--accent);
            stroke-width: 3;
            fill: none;
            animation: line-flow 1.5s linear infinite;
        }

        /* 连接点圆点样式 */
        .connection-dot {
            fill: var(--bg-node);
            stroke: var(--connection-line);
            stroke-width: 2;
            transition: all 0.3s ease;
        }

        .connection-dot.highlight {
            fill: var(--accent);
            stroke: var(--accent);
            stroke-width: 2;
        }

        @keyframes line-flow {
            0% {
                stroke-dasharray: 10, 20;
                stroke-dashoffset: 0;
            }
            100% {
                stroke-dasharray: 10, 20;
                stroke-dashoffset: -30;
            }
        }

        .node {
            position: absolute;
            background: var(--bg-node);
            border: 1px solid var(--border-secondary);
            border-radius: 8px;
            min-width: 180px;
            min-height: 60px;
            width: 220px;
            z-index: 10;
            box-shadow: 0 4px 12px var(--shadow-node);
            transition: box-shadow 0.1s, border-color 0.3s;
            overflow: hidden;
        }

        /* 节点拉伸控制点 */
        .resize-handle {
            position: absolute;
            z-index: 100;
            background: transparent;
        }

        .resize-handle:hover,
        .resize-handle.active {
            background: var(--accent);
        }

        /* 角控制点 - 8x8px */
        .resize-handle.nw,
        .resize-handle.ne,
        .resize-handle.sw,
        .resize-handle.se {
            width: 10px;
            height: 10px;
        }

        .resize-handle.nw {
            top: -5px;
            left: -5px;
            cursor: nw-resize;
            border-radius: 0 0 4px 0;
        }

        .resize-handle.ne {
            top: -5px;
            right: -5px;
            cursor: ne-resize;
            border-radius: 0 0 0 4px;
        }

        .resize-handle.sw {
            bottom: -5px;
            left: -5px;
            cursor: sw-resize;
            border-radius: 0 4px 0 0;
        }

        .resize-handle.se {
            bottom: -5px;
            right: -5px;
            cursor: se-resize;
            border-radius: 4px 0 0 0;
        }

        /* 边控制点 */
        .resize-handle.n,
        .resize-handle.s {
            width: calc(100% - 20px);
            height: 6px;
            left: 10px;
        }

        .resize-handle.n {
            top: -3px;
            cursor: n-resize;
            border-radius: 0 0 3px 3px;
        }

        .resize-handle.s {
            bottom: -3px;
            cursor: s-resize;
            border-radius: 3px 3px 0 0;
        }

        .resize-handle.w,
        .resize-handle.e {
            width: 6px;
            height: calc(100% - 20px);
            top: 10px;
        }

        .resize-handle.w {
            left: -3px;
            cursor: w-resize;
            border-radius: 0 3px 3px 0;
        }

        .resize-handle.e {
            right: -3px;
            cursor: e-resize;
            border-radius: 3px 0 0 3px;
        }

        /* 节点正在拉伸时的样式 */

            user-select: none;
            -webkit-user-select: none;

            cursor: default !important;

        .node:hover {

        .node.collapsed .node-body {

        }

        .subgraph-tag {

            color: #fff;
            padding: 3px 10px;

            overflow: hidden;

            overflow: hidden;

            display: flex;
            gap: 4px;
            margin-left: auto;
        }

            height: 18px;

        }

        .node-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .node-body::-webkit-scrollbar-thumb {
            background: var(--border-tertiary);
            border-radius: 2px;
        }

        .param-row {
            display: flex;
            padding: 2px 0;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border-param);
        }

        .param-key {
            color: var(--text-muted);
            flex-shrink: 0;
            overflow: visible;
            text-overflow: ellipsis;
            white-space: nowrap;
            background: var(--bg-param-key);

            border-radius: 2px;

        .param-value {
            color: var(--text-secondary);

            flex: 1;
            overflow: auto;
            text-overflow: clip;
            white-space: pre-wrap;
            word-wrap: break-word;
            background: var(--bg-param-value);

            border-radius: 2px;
            max-height: 100px;

            width: 3px;
            height: 3px;
        }

        .param-value::-webkit-scrollbar-track {
            background: transparent;
        }

        .param-value::-webkit-scrollbar-thumb {
            background: var(--border-tertiary);

        .long-text-wrapper {
            border: 1px solid var(--border-secondary);
            border-radius: 4px;
            background: var(--bg-param-value);

            flex: 1;

        .text-action-btn {
            font-size: 9px;

            border-radius: 2px;

            color: var(--text-primary);
            line-height: 1.4;

        .text-action-btn:hover {

        .virtual-scroll-container {

            height: 16px;
            line-height: 16px;
            min-width: fit-content;

        .virtual-scroll-line:hover {

        }

        .param-value-short {
            padding: 4px 8px;
            white-space: pre-wrap;
            word-break: break-all;
            overflow: auto;
            max-height: 100px;
        }

        .long-param {
            flex-direction: row;
            align-items: flex-start;
        }

        .long-param .param-key {
            margin-bottom: 0;
            flex-shrink: 0;
            margin-right: 8px;
            margin-top: 4px;
        }

        .param-value-container {
            flex: 1;
            min-width: 0;
        }

        /* Toast 提示 */
        .toast-message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            z-index: 10000;
            font-size: 14px;
            animation: fadeInOut 2s ease;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            10% { opacity: 1; transform: translateX(-50%) translateY(0); }
            90% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }

        /* 模态弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: 12px;
            padding: 24px 32px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-container {
            transform: scale(1) translateY(0);
        }

        .modal-icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 16px;
        }

        .modal-icon.error {
            color: #ff6b6b;
        }

        .modal-icon.warning {
            color: #ffd93d;
        }

        .modal-icon.info {
            color: #6bcf7f;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 12px;
        }

        .modal-message {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            text-align: center;
            margin-bottom: 20px;
            white-space: pre-line;
        }

        .modal-btn {
            display: block;
            width: 100%;
            padding: 12px 24px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .modal-btn:hover {
            background: #ff1493;
            transform: translateY(-1px);
        }

        .modal-btn:active {
            transform: translateY(0);
        }
    </style>

        /**
         * 根据子图ID生成颜色
         * 使用哈希算法确保同一子图始终获得相同颜色
         * @param {string} subgraphId - 子图ID
         * @returns {string} HSL颜色字符串
         */
        function getSubgraphColor(subgraphId) {
            if (!subgraphId) return null;
            let hash = 0;
            const idStr = String(subgraphId);
            for (let i = 0; i < idStr.length; i++) {
                hash = idStr.charCodeAt(i) + ((hash << 5) - hash);
            }
            const index = Math.abs(hash) % SUBGRAPH_COLORS.length;
            return SUBGRAPH_COLORS[index];
        }

        // 转换按钮事件监听

        document.getElementById('zoomIn').addEventListener('click', () => {

        // 重置按钮事件监听
        document.getElementById('resetBtn').addEventListener('click', resetPage);

        /**
         * 重置网页到初始状态
         * 清空所有内容，包括工作流数据、文件信息、视图状态等
         * 相当于刷新页面(F5)的效果，但保持主题和语言设置

        function resetPage() {
            // 清空工作流视图
            clearWorkflowView();

            // 重置文件相关状态
            lastLoadedFile = null;

        zoomLevel.addEventListener('change', () => {
            const newScale = Math.max(0.1, Math.min(5, parseInt(zoomLevel.value) / 100));
            setZoom(newScale, canvasContainer.clientWidth / 2, canvasContainer.clientHeight / 2);
        });

        /**
         * 自适应视图 - 缩放和平移以显示所有节点
         * 计算所有节点的边界框，然后调整缩放和平移使所有节点可见
         */
        function fitToView() {
            if (!workflowData || !workflowData.nodes) return;

            const nodes = document.querySelectorAll('.node');
            if (nodes.length === 0) return;

            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

            // 计算所有节点的边界框
            nodes.forEach(node => {
                const x = parseFloat(node.style.left);
                const y = parseFloat(node.style.top);
                const w = node.offsetWidth;
                const h = node.offsetHeight;
                minX = Math.min(minX, x);
                minY = Math.min(minY, y);
                maxX = Math.max(maxX, x + w);
                maxY = Math.max(maxY, y + h);
            });

            const contentWidth = maxX - minX + 100;
            const contentHeight = maxY - minY + 100;

            // 计算合适的缩放比例
            const scaleX = canvasContainer.clientWidth / contentWidth;
            const scaleY = canvasContainer.clientHeight / contentHeight;
            const newScale = Math.min(scaleX, scaleY, 2);

            // 计算平移量使内容居中
            const contentCenterX = (minX + maxX) / 2 * newScale;
            const contentCenterY = (minY + maxY) / 2 * newScale;
            const containerCenterX = canvasContainer.clientWidth / 2;
            const containerCenterY = canvasContainer.clientHeight / 2;

            panX = containerCenterX - contentCenterX;
            panY = containerCenterY - contentCenterY;

            scale = newScale;
            updateTransform();
        }

        document.addEventListener('wheel', (e) => {
            if (!workflowData || !workflowData.nodes) return;
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            setZoom(scale * delta, e.clientX, e.clientY);
        }, { passive: false });

        let isPanning = false;
        let panStartX, panStartY;

        // 框选相关变量
        let isSelecting = false;
        let selectionStartX, selectionStartY;
        let isMultiDragging = false;
        let multiDragStartX, multiDragStartY;
        let multiDragNodePositions = new Map();

        // 拖动标记，用于防止拖动后触发点击事件
        let justFinishedDrag = false;

        // 节点拉伸状态变量
        let isResizing = false;
        let resizeNodeId = null;
        let resizeDirection = null;
        let resizeStartX = 0;
        let resizeStartY = 0;
        let resizeStartWidth = 0;
        let resizeStartHeight = 0;
        let resizeStartLeft = 0;
        let resizeStartTop = 0;
        const MIN_NODE_WIDTH = 180;
        const MIN_NODE_HEIGHT = 60;

        canvasContainer.addEventListener('mousedown', (e) => {
            // Ctrl+左键：开始框选
            if (e.ctrlKey && e.button === 0 && (e.target === canvasContainer || e.target === canvasWrapper)) {
                isSelecting = true;
                // 使用相对于 canvasContainer 的坐标（不受 transform 影响）
                const rect = canvasContainer.getBoundingClientRect();
                selectionStartX = e.clientX - rect.left;
                selectionStartY = e.clientY - rect.top;
                selectionBox.style.display = 'block';
                selectionBox.style.left = selectionStartX + 'px';
                selectionBox.style.top = selectionStartY + 'px';
                selectionBox.style.width = '0px';
                selectionBox.style.height = '0px';
                e.preventDefault();
                return;
            }

            // 普通情况：平移画布
            if (e.target === canvasContainer || e.target === canvasWrapper) {
                isPanning = true;
                panStartX = e.clientX - panX;
                panStartY = e.clientY - panY;
                canvasContainer.style.cursor = 'grabbing';
            }
        });

        canvasContainer.addEventListener('dblclick', (e) => {
            if (e.target === canvasContainer || e.target === canvasWrapper) {
                deselectAll();
                selectedNodeIds.clear();
                updateMultiSelection();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (document.activeElement.tagName === 'INPUT') {
                    document.activeElement.blur();
                } else {
                    deselectAll();
                    selectedNodeIds.clear();
                    updateMultiSelection();
                }
            }
        });

        document.addEventListener('mousemove', (e) => {
            // 处理节点拉伸 - 放在最前面确保及时响应
            if (isResizing && resizeNodeId) {
                const nodeEl = document.querySelector(`[data-node-id="${resizeNodeId}"]`);
                if (nodeEl) {
                    // 计算鼠标移动距离（考虑画布缩放）
                    const dx = (e.clientX - resizeStartX) / scale;
                    const dy = (e.clientY - resizeStartY) / scale;

                    let newWidth = resizeStartWidth;
                    let newHeight = resizeStartHeight;
                    let newLeft = resizeStartLeft;
                    let newTop = resizeStartTop;

                    // 根据拉伸方向计算新的尺寸和位置
                    switch (resizeDirection) {
                        case 'e': // 东 - 右边
                            newWidth = Math.max(MIN_NODE_WIDTH, resizeStartWidth + dx);
                            break;
                        case 'w': // 西 - 左边
                            newWidth = Math.max(MIN_NODE_WIDTH, resizeStartWidth - dx);
                            newLeft = resizeStartLeft + (resizeStartWidth - newWidth);
                            break;
                        case 's': // 南 - 下边
                            newHeight = Math.max(MIN_NODE_HEIGHT, resizeStartHeight + dy);
                            break;
                        case 'n': // 北 - 上边
                            newHeight = Math.max(MIN_NODE_HEIGHT, resizeStartHeight - dy);
                            newTop = resizeStartTop + (resizeStartHeight - newHeight);
                            break;
                        case 'se': // 东南 - 右下角
                            newWidth = Math.max(MIN_NODE_WIDTH, resizeStartWidth + dx);
                            newHeight = Math.max(MIN_NODE_HEIGHT, resizeStartHeight + dy);
                            break;
                        case 'sw': // 西南 - 左下角
                            newWidth = Math.max(MIN_NODE_WIDTH, resizeStartWidth - dx);
                            newHeight = Math.max(MIN_NODE_HEIGHT, resizeStartHeight + dy);
                            newLeft = resizeStartLeft + (resizeStartWidth - newWidth);
                            break;
                        case 'ne': // 东北 - 右上角
                            newWidth = Math.max(MIN_NODE_WIDTH, resizeStartWidth + dx);
                            newHeight = Math.max(MIN_NODE_HEIGHT, resizeStartHeight - dy);
                            newTop = resizeStartTop + (resizeStartHeight - newHeight);
                            break;
                        case 'nw': // 西北 - 左上角
                            newWidth = Math.max(MIN_NODE_WIDTH, resizeStartWidth - dx);
                            newHeight = Math.max(MIN_NODE_HEIGHT, resizeStartHeight - dy);
                            newLeft = resizeStartLeft + (resizeStartWidth - newWidth);
                            newTop = resizeStartTop + (resizeStartHeight - newHeight);
                            break;
                    }

                    // 应用新的尺寸和位置
                    nodeEl.style.width = newWidth + 'px';
                    nodeEl.style.height = newHeight + 'px';
                    nodeEl.style.left = newLeft + 'px';
                    nodeEl.style.top = newTop + 'px';

                    // 立即更新连接线
                    updateConnectionPaths();
                    updateConnectionHighlight();
                }
                return; // 拉伸时阻止其他操作
            }

            if (isPanning) {
                panX = e.clientX - panStartX;
                panY = e.clientY - panStartY;
                updateTransform();
            }

            // 更新框选框
            if (isSelecting) {
                // 使用相对于 canvasContainer 的坐标（不受 transform 影响）
                const rect = canvasContainer.getBoundingClientRect();
                const currentX = e.clientX - rect.left;
                const currentY = e.clientY - rect.top;

                const left = Math.min(selectionStartX, currentX);
                const top = Math.min(selectionStartY, currentY);
                const width = Math.abs(currentX - selectionStartX);
                const height = Math.abs(currentY - selectionStartY);

                selectionBox.style.left = left + 'px';
                selectionBox.style.top = top + 'px';
                selectionBox.style.width = width + 'px';
                selectionBox.style.height = height + 'px';
            }

            // 多节点拖动
            if (isMultiDragging && selectedNodeIds.size > 0) {
                const dx = (e.clientX - multiDragStartX) / scale;
                const dy = (e.clientY - multiDragStartY) / scale;

                selectedNodeIds.forEach(nodeId => {
                    const nodeEl = document.querySelector(`[data-node-id="${nodeId}"]`);
                    const startPos = multiDragNodePositions.get(nodeId);
                    if (nodeEl && startPos) {
                        nodeEl.style.left = (startPos.x + dx) + 'px';
                        nodeEl.style.top = (startPos.y + dy) + 'px';
                    }
                });

                updateConnectionPaths();
                updateConnectionHighlight();
            }
        });

        document.addEventListener('mouseup', (e) => {
            // 结束节点拉伸 - 放在最前面确保及时清理状态
            if (isResizing) {
                const nodeEl = document.querySelector(`[data-node-id="${resizeNodeId}"]`);
                if (nodeEl) {
                    // 移除拉伸中样式
                    nodeEl.classList.remove('resizing');
                    nodeEl.querySelectorAll('.resize-handle').forEach(h => {
                        h.classList.remove('active');
                    });

                    // 保存节点尺寸状态
                    if (!nodeStates[resizeNodeId]) {
                        nodeStates[resizeNodeId] = {};
                    }
                    nodeStates[resizeNodeId].width = nodeEl.offsetWidth;
                    nodeStates[resizeNodeId].height = nodeEl.offsetHeight;

                    // 保存节点位置（如果位置发生了变化）
                    const newLeft = parseFloat(nodeEl.style.left);
                    const newTop = parseFloat(nodeEl.style.top);
                    if (newLeft !== resizeStartLeft || newTop !== resizeStartTop) {
                        if (!workflowData.nodePositions) {
                            workflowData.nodePositions = {};
                        }
                        workflowData.nodePositions[resizeNodeId] = {
                            x: newLeft,
                            y: newTop
                        };
                    }
                }

                // 立即清理所有拉伸状态
                document.body.style.userSelect = '';
                document.body.style.webkitUserSelect = '';
                isResizing = false;
                resizeNodeId = null;
                resizeDirection = null;

                // 设置标记，防止触发点击事件
                justFinishedDrag = true;
                setTimeout(() => {
                    justFinishedDrag = false;
                }, 50);
            }

            // 结束框选
            if (isSelecting) {
                const containerRect = canvasContainer.getBoundingClientRect();
                const endX = e.clientX - containerRect.left;
                const endY = e.clientY - containerRect.top;

                // 选择框的视口坐标
                const selLeft = Math.min(selectionStartX, endX);
                const selTop = Math.min(selectionStartY, endY);
                const selRight = Math.max(selectionStartX, endX);
                const selBottom = Math.max(selectionStartY, endY);

                // 将选择框坐标转换为节点坐标系（考虑 pan 和 scale）
                const nodeLeft = (selLeft - panX) / scale;
                const nodeTop = (selTop - panY) / scale;
                const nodeRight = (selRight - panX) / scale;
                const nodeBottom = (selBottom - panY) / scale;

                // 检测哪些节点在选择框内
                document.querySelectorAll('.node').forEach(nodeEl => {
                    const nodeX = parseFloat(nodeEl.style.left);
                    const nodeY = parseFloat(nodeEl.style.top);
                    const nodeW = nodeEl.offsetWidth;
                    const nodeH = nodeEl.offsetHeight;

                    // 检查节点是否在选择框内（部分重叠也算）
                    if (nodeX < nodeRight && nodeX + nodeW > nodeLeft &&
                        nodeY < nodeBottom && nodeY + nodeH > nodeTop) {
                        const nodeId = nodeEl.dataset.nodeId;
                        selectedNodeIds.add(nodeId);
                    }
                });

                updateMultiSelection();
                selectionBox.style.display = 'none';
                isSelecting = false;
            }

            // 结束多节点拖动
            if (isMultiDragging) {
                // 保存新位置
                selectedNodeIds.forEach(nodeId => {
                    const nodeEl = document.querySelector(`[data-node-id="${nodeId}"]`);
                    if (nodeEl) {
                        if (!workflowData.nodePositions) {
                            workflowData.nodePositions = {};
                        }
                        workflowData.nodePositions[nodeId] = {
                            x: parseFloat(nodeEl.style.left),
                            y: parseFloat(nodeEl.style.top)
                        };
                    }
                });

                document.body.style.userSelect = '';
                document.body.style.webkitUserSelect = '';
                isMultiDragging = false;
                multiDragNodePositions.clear();

                // 设置标记，防止触发点击事件
                justFinishedDrag = true;
                // 延迟重置标记，确保 click 事件能检测到
                setTimeout(() => {
                    justFinishedDrag = false;
                }, 50);
            }

            isPanning = false;
            canvasContainer.style.cursor = 'default';
        });

        /**
         * 更新多选节点的视觉状态
         */
        function updateMultiSelection() {
            document.querySelectorAll('.node').forEach(nodeEl => {
                const nodeId = nodeEl.dataset.nodeId;
                if (selectedNodeIds.has(nodeId)) {
                    nodeEl.classList.add('multi-selected');
                } else {
                    nodeEl.classList.remove('multi-selected');
                }
            });
        }

        /**
         * 设置画布缩放级别
         * @param {number} newScale - 新的缩放比例
         * @param {number} centerX - 缩放中心点 X 坐标
         * @param {number} centerY - 缩放中心点 Y 坐标
         */
        function setZoom(newScale, centerX, centerY) {
            newScale = Math.max(0.1, Math.min(5, newScale));

            const rect = canvasContainer.getBoundingClientRect();
            const mouseX = centerX - rect.left;
            const mouseY = centerY - rect.top;

            // 以鼠标位置为中心进行缩放
            const scaleChange = newScale / scale;
            panX = mouseX - (mouseX - panX) * scaleChange;
            panY = mouseY - (mouseY - panY) * scaleChange;

            scale = newScale;
            updateTransform();
        }

        /**
         * 更新画布的变换（平移和缩放）
         * 同时更新缩放级别显示和连接线位置
         */
        function updateTransform() {
            canvasWrapper.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
            zoomLevel.value = Math.round(scale * 100);
            // 只有在有工作流数据时才更新连接线
            if (workflowData && workflowData.connections) {
                updateConnectionPaths();
            }
        }

        /**
         * 处理用户选择的文件
         * 流程：检查文件大小 -> 读取文件 -> 根据当前解析模式提取元数据 -> 解析工作流 -> 渲染 -> 自适应视图
         * @param {File} file - 用户选择的文件对象
         * @param {boolean} saveReference - 是否保存文件引用用于模式切换时重新解析
         */
        async function handleFile(file, saveReference = true) {
            // 文件大小限制：100MB
            const MAX_FILE_SIZE = 100 * 1024 * 1024;
            if (file.size > MAX_FILE_SIZE) {
                showModal(t('fileTooLarge'), 'warning');
                return;
            }

            // 保存文件引用，用于切换解析模式时重新解析
            if (saveReference) {
                lastLoadedFile = file;
            }

            // 保存文件名
            currentFileName = file.name;

            const arrayBuffer = await file.arrayBuffer();
            const uint8Array = new Uint8Array(arrayBuffer);

            // 如果是JSON文件，保存原始数据用于转换功能
            const ext = file.name.toLowerCase().split('.').pop();
            if (ext === 'json') {
                try {
                    const textDecoder = new TextDecoder('utf-8');
                    originalJsonData = JSON.parse(textDecoder.decode(uint8Array));
                } catch (e) {
                    originalJsonData = null;
                }
            } else {
                originalJsonData = null;
            }

            // 检查并更新转换按钮状态
            updateConvertButton();

            // 先清空视图和重置状态，避免新文件解析失败时仍显示旧文件内容
            clearWorkflowView();

            // 更新文件信息（显示新文件的基本信息）
            updateFileInfo(file, uint8Array);

            try {
                // 根据当前解析模式选择对应的元数据提取函数
                let metadata = null;
                switch (currentParseMode) {
                    case 'native':
                        metadata = await readMetadataNative(uint8Array, file.name);
                        break;
                    case 'merged':
                        metadata = await readMetadataMerged(uint8Array, file.name);
                        break;
                    case 'prompt_fw':
                        metadata = await readMetadataPromptFW(uint8Array, file.name);
                        break;
                    default:
                        metadata = await readMetadataNative(uint8Array, file.name);
                }

                if (!metadata) {
                    // 解析失败，视图已清空，文件信息已更新，直接返回
                    return;
                }

                // 解析工作流数据
                workflowData = parseWorkflow(metadata);

                // 重置视图状态
                scale = 1;
                panX = 50;
                panY = 50;
                nodeStates = {};

                // 渲染并自适应视图
                renderWorkflow();
                fitToView();

                document.getElementById('infoNodeCount').textContent = Object.keys(workflowData.nodes).length;
            } catch (error) {
                console.error(error);
            }
        }

        /**
         * 检查JSON数据是否包含可转换的包装格式
         * @param {Object} json - 解析后的JSON对象
         * @returns {Object|null} - { hasPrompt: boolean, hasWorkflow: boolean, hasFullWorkflow: boolean } 或 null
         */
        function detectConvertibleFormat(json) {
            if (!json || typeof json !== 'object') return null;

            const hasPrompt = json.prompt && typeof json.prompt === 'object';
            const hasWorkflow = json.workflow &&
                json.workflow.nodes &&
                Array.isArray(json.workflow.nodes);
            const hasFullWorkflow = json.full_workflow &&
                json.full_workflow.nodes &&
                Array.isArray(json.full_workflow.nodes);

            // 只要有 prompt 或 workflow/full_workflow 就可以转换
            if (hasPrompt || hasWorkflow || hasFullWorkflow) {
                return {
                    hasPrompt,
                    hasWorkflow,
                    hasFullWorkflow
                };
            }

            return null;
        }

        /**
         * 更新转换按钮的状态和显示
         */
        function updateConvertButton() {
            const convertBtn = document.getElementById('convertBtn');
            const convertStatus = document.getElementById('convertStatus');

            if (!originalJsonData) {
                convertBtn.disabled = true;
                convertStatus.textContent = '';
                return;
            }

            const convertible = detectConvertibleFormat(originalJsonData);

            if (convertible) {
                convertBtn.disabled = false;
                const parts = [];
                if (convertible.hasPrompt) parts.push(t('fieldPrompt'));
                if (convertible.hasWorkflow) parts.push(t('fieldWorkflow'));
                if (convertible.hasFullWorkflow) parts.push(t('fieldFullWorkflow'));
                convertStatus.textContent = `${t('convertAvailable')}: ${parts.join(' + ')}`;
            } else {
                convertBtn.disabled = true;
                convertStatus.textContent = t('convertNoWrapped');
            }
        }

        /**
         * 转换工作流JSON并下载
         * 将 prompt 和 workflow 的内容合并到根级
         */
        function convertAndDownloadWorkflow() {
            if (!originalJsonData) {
                showToast(t('convertNoData'), 'error');
                return;
            }

            // 检查是否有可转换的包装格式
            const hasPrompt = originalJsonData.prompt &&
                typeof originalJsonData.prompt === 'object';
            const hasWorkflow = originalJsonData.workflow &&
                originalJsonData.workflow.nodes &&
                Array.isArray(originalJsonData.workflow.nodes);
            const hasFullWorkflow = originalJsonData.full_workflow &&
                originalJsonData.full_workflow.nodes &&
                Array.isArray(originalJsonData.full_workflow.nodes);

            if (!hasPrompt && !hasWorkflow && !hasFullWorkflow) {
                showToast(t('convertNoWrapped'), 'info');
                return;
            }

            try {
                // 创建新的对象，将内容合并到根级
                const convertedData = {};

                // 先添加 prompt 的内容（如果有）
                if (hasPrompt) {
                    Object.assign(convertedData, originalJsonData.prompt);
                }

                // 再添加 workflow 或 full_workflow 的内容（如果有）
                // workflow 的内容会覆盖 prompt 中同名的键
                if (hasWorkflow) {
                    Object.assign(convertedData, originalJsonData.workflow);
                } else if (hasFullWorkflow) {
                    Object.assign(convertedData, originalJsonData.full_workflow);
                }

                // 生成文件名
                const baseName = currentFileName
                    ? currentFileName.replace(/\.json$/i, '')
                    : 'workflow';
                const newFileName = `${baseName}_converted.json`;

                // 创建下载
                const blob = new Blob(
                    [JSON.stringify(convertedData, null, 2)],
                    { type: 'application/json' }
                );
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = newFileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                showToast(`${t('convertSuccess')}: ${newFileName}`, 'success');
            } catch (e) {
                console.error('Conversion error:', e);
                showToast(t('convertError'), 'error');
            }
        }

        /**
         * 更新文件信息显示
         * @param {File} file - 文件对象
         * @param {Uint8Array} uint8Array - 文件内容的二进制数据
         */
        function updateFileInfo(file, uint8Array) {
            const filename = file.name;
            const ext = filename.split('.').pop().toLowerCase();
            const size = formatFileSize(file.size);
            const lastModified = new Date(file.lastModified).toLocaleString(currentLang === 'zh' ? 'zh-CN' : 'en-US');

            // 保存当前文件类型，用于语言切换时更新
            currentFileType = ext;

            document.getElementById('infoFilename').textContent = filename;
            document.getElementById('infoSize').textContent = size;
            document.getElementById('infoModified').textContent = lastModified;

            // 使用 i18n 获取文件类型名称
            const typeMap = {
                'png': t('typePng'),
                'latent': t('typeLatent'),
                'json': t('typeJson')
            };
            document.getElementById('infoType').textContent = typeMap[ext] || ext;

            // 根据文件类型显示不同的预览和信息
            if (ext === 'png') {
                const dims = getPngDimensions(uint8Array);
                if (dims) {
                    document.getElementById('infoResolution').textContent = `${dims.width} × ${dims.height}`;
                    displayImagePreview(uint8Array);
                } else {
                    document.getElementById('infoResolution').textContent = t('unknown');
                }
            } else if (ext === 'latent') {
                document.getElementById('infoResolution').innerHTML = `<span class="latent-badge">${t('latent')}</span>`;
                displayLatentPreview();
            } else {
                document.getElementById('infoResolution').textContent = '-';
                displayNoPreview();
            }
        }

        /**
         * 格式化文件大小为易读格式
         * @param {number} bytes - 字节数
         * @returns {string} 格式化后的文件大小 (如 "1.5 MB")
         */
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        /**
         * 从 PNG 二进制数据中提取图片尺寸
         * 解析 IHDR chunk 获取宽度和高度
         * @param {Uint8Array} data - PNG 文件的二进制数据
         * @returns {Object|null} 包含 width 和 height 的对象，解析失败返回 null
         */
        function getPngDimensions(data) {
            try {
                if (data.length < 24) return null;

                // 验证 PNG 文件签名
                const pngSignature = [0x89, 0x50, 0x4E, 0x47, 0x0D, 0x0A, 0x1A, 0x0A];
                for (let i = 0; i < 8; i++) {
                    if (data[i] !== pngSignature[i]) return null;
                }

                // 遍历 chunks 查找 IHDR
                let offset = 8;
                while (offset < data.length - 12) {
                    const length = (data[offset] << 24) | (data[offset + 1] << 16) |
                                   (data[offset + 2] << 8) | data[offset + 3];

                    const type = String.fromCharCode(
                        data[offset + 4], data[offset + 5],
                        data[offset + 6], data[offset + 7]
                    );

                    if (type === 'IHDR') {
                        const width = (data[offset + 8] << 24) | (data[offset + 9] << 16) |
                                     (data[offset + 10] << 8) | data[offset + 11];
                        const height = (data[offset + 12] << 24) | (data[offset + 13] << 16) |
                                      (data[offset + 14] << 8) | data[offset + 15];
                        return { width, height };
                    }

                    if (type === 'IEND') break;
                    offset += 12 + length;
                }
            } catch (e) {
                console.error('Error getting PNG dimensions:', e);
            }
            return null;
        }

        /**
         * 显示 PNG 图片预览
         * @param {Uint8Array} uint8Array - PNG 文件的二进制数据
         */
        function displayImagePreview(uint8Array) {
            // 释放上一次的 Object URL，防止内存泄漏
            if (currentPreviewUrl) {
                URL.revokeObjectURL(currentPreviewUrl);
                currentPreviewUrl = null;
            }

            const blob = new Blob([uint8Array], { type: 'image/png' });
            currentPreviewUrl = URL.createObjectURL(blob);

            const preview = document.getElementById('filePreview');
            const placeholder = document.getElementById('filePlaceholder');

            placeholder.innerHTML = '<img src="' + currentPreviewUrl + '" alt="Preview" style="max-width: 100%; max-height: 100%; object-fit: contain;">';
            placeholder.style.cursor = 'pointer';
            placeholder.title = t('clickToChange');
        }

        function displayLatentPreview() {
            const placeholder = document.getElementById('filePlaceholder');
            placeholder.innerHTML = `
                <span class="icon">🧠</span>
                <span>${t('latentFile')}</span>
                <span class="file-placeholder-hint">${t('noPreview')}</span>
                <span class="file-placeholder-hint">${t('clickToChange')}</span>
            `;
        }

        function displayNoPreview() {
            const placeholder = document.getElementById('filePlaceholder');
            placeholder.innerHTML = `
                <span class="icon">📄</span>
                <span>${t('jsonWorkflow')}</span>
                <span class="file-placeholder-hint">${t('clickToChange')}</span>

        /**
         * 根据文件扩展名选择对应的元数据读取函数
         * 处理流程：
         * 1. .latent 文件 -> readLatentMetadata (读取 latent 文件的头部元数据)
         * 2. .json 文件 -> readJsonMetadata (自动识别并解析两种 prompt 格式)
         * 3. 其他文件 (如 .png) -> readPngMetadata (从 PNG 的 tEXt/iTXt chunk 读取)
         *
         * 返回格式: { prompt: {...}, workflow: {...} }
         * - prompt: ComfyUI API 格式的工作流数据
         * - workflow: 完整的 Workflow 格式（包含节点位置等信息，可能为 null）
         */

        /**
         * ============================================================
         * 原生模式解析函数 - 解析 ComfyUI 官方标准格式
         * ============================================================
         * 适用于所有文件类型（PNG、Latent、JSON）
         * 统一按照 ComfyUI 官方格式解析 prompt 和 workflow
         */

        /**
         * ============================================================
         * 原生模式解析函数 - 处理 Workflow 格式
         * ============================================================
         * 将 workflow（nodes + links）转换为 prompt 格式
         * 适用于 ComfyUI 网页保存/导出的 JSON 文件
         */

        /**
         * 原生模式：从文件中读取 workflow 并转换为 prompt
         * 只处理 nodes + links 格式，不处理 prompt + workflow 格式
         * @param {Uint8Array} data - 文件数据
         * @param {string} filename - 文件名
         * @returns {Object|null} - { prompt: {...}, workflow: {...} }
         */
        async function readMetadataNative(data, filename) {
            const ext = filename.toLowerCase().split('.').pop();

            if (ext === 'latent') {
                return readLatentMetadataNative(data);
            } else if (ext === 'json') {
                return readJsonMetadataNative(data);
            } else {
                return readPngMetadataNative(data);
            }
        }

        /**
         * 原生模式：从 PNG 文件中读取 workflow 元数据
         * 只读取 workflow 字段（nodes + links），转换为 prompt
         * @param {Uint8Array} data - PNG 文件数据
         * @returns {Object|null} - { prompt: {...}, workflow: {...} }
         */
        async function readPngMetadataNative(data) {
            try {
                const textDecoder = new TextDecoder('utf-8');
                let offset = 8;
                let workflowData = null;

                while (offset < data.length - 12) {
                    const length = (data[offset] << 24) | (data[offset + 1] << 16) |
                                   (data[offset + 2] << 8) | data[offset + 3];

                    if (length < 0 || length > data.length - offset - 12) break;

                    const type = textDecoder.decode(data.slice(offset + 4, offset + 8));

                    if (type === 'tEXt' || type === 'iTXt') {
                        const chunkData = data.slice(offset + 8, offset + 8 + length);
                        const text = textDecoder.decode(chunkData);
                        const parsed = parsePngText(text);
                        // 原生模式只使用 workflow 字段
                        if (parsed.workflow) workflowData = parsed.workflow;
                    }

                    if (type === 'IEND') break;
                    offset += 12 + length;
                }

                // 解析 workflow 字符串为对象
                if (workflowData && typeof workflowData === 'string') {
                    try {
                        workflowData = JSON.parse(workflowData);
                    } catch (e) {
                        console.error('Native mode: Failed to parse workflow JSON', e);
                    }
                }

                // 检查是否为有效的 workflow 格式
                if (workflowData && workflowData.nodes && Array.isArray(workflowData.nodes)) {
                    const prompt = convertWorkflowToPrompt(workflowData);
                    return { prompt: prompt, workflow: workflowData };
                }

                showModal(t('noNativeWorkflow'), 'error');
                return null;
            } catch (e) {
                console.error('Native mode PNG read error:', e);
                return null;
            }
        }

        /**
         * 原生模式：从 Latent 文件中读取 workflow 元数据
         * 只读取 __metadata__ 中的 workflow，转换为 prompt
         * @param {Uint8Array} data - Latent 文件数据
         * @returns {Object|null} - { prompt: {...}, workflow: {...} }
         */
        async function readLatentMetadataNative(data) {
            try {
                if (data.length < 8) return null;

                const headerSize = Number(
                    new BigUint64Array(data.slice(0, 8).buffer)[0]
                );

                if (headerSize < 0 || headerSize > data.length - 8) {
                    return null;
                }

                const textDecoder = new TextDecoder('utf-8');
                const headerJson = textDecoder.decode(
                    data.slice(8, 8 + headerSize)
                );

                const header = JSON.parse(headerJson);

                if (header.__metadata__) {
                    const metadata = header.__metadata__;
                    let workflowData = null;

                    // 原生模式只使用 workflow 字段
                    if (metadata.workflow) {
                        try {
                            workflowData = JSON.parse(metadata.workflow);
                        } catch {
                            workflowData = metadata.workflow;
                        }
                    }

                    // 检查是否为有效的 workflow 格式
                    if (workflowData && workflowData.nodes && Array.isArray(workflowData.nodes)) {
                        const prompt = convertWorkflowToPrompt(workflowData);
                        return { prompt: prompt, workflow: workflowData };
                    }
                }

                showModal(t('noNativeWorkflow'), 'error');
                return null;
            } catch (e) {
                console.error('Native mode Latent read error:', e);
                return null;
            }
        }

        /**
         * 原生模式：从 JSON 文件中读取 workflow 元数据
         * 只处理 nodes + links 格式，转换为 prompt
         * 支持两种格式：
         * 1. 纯 workflow 格式：{ nodes: [...], links: [...] }
         * 2. 包含 workflow 字段的格式：{ prompt: {...}, workflow: { nodes: [...], links: [...] } }
         * @param {Uint8Array} data - JSON 文件数据
         * @returns {Object|null} - { prompt: {...}, workflow: {...} }
         */
        async function readJsonMetadataNative(data) {
            try {
                const textDecoder = new TextDecoder('utf-8');
                const text = textDecoder.decode(data);
                const json = JSON.parse(text);

                let workflowData = null;

                // 原生模式只处理 workflow 格式（nodes + links）
                // 检查格式1：纯 workflow 格式
                if (json.nodes && Array.isArray(json.nodes) &&
                    json.links && Array.isArray(json.links)) {
                    workflowData = json;
                }
                // 检查格式2：包含 workflow 字段的格式
                else if (json.workflow && json.workflow.nodes &&
                         Array.isArray(json.workflow.nodes) &&
                         json.workflow.links &&
                         Array.isArray(json.workflow.links)) {
                    workflowData = json.workflow;
                }

                if (workflowData) {
                    const prompt = convertWorkflowToPrompt(workflowData);
                    return { prompt: prompt, workflow: workflowData };
                }

                showModal(t('noNativeWorkflow'), 'error');
                return null;
            } catch (e) {
                console.error('Native mode JSON read error:', e);
                return null;
            }
        }

        /**
         * ============================================================
         * 合并模式解析函数 - 合并 Prompt 和 Workflow
         * ============================================================
         * 处理同时包含 prompt 和 workflow 的文件（如官方 SaveImage 保存的 PNG）
         * 以 workflow 为基础结构，用 prompt 中的数据补充
         */

        /**
         * 合并模式：从文件中读取并合并 prompt 和 workflow
         * @param {Uint8Array} data - 文件数据
         * @param {string} filename - 文件名
         * @returns {Object|null} - { prompt: {...}, workflow: {...} }
         */
        async function readMetadataMerged(data, filename) {
            const ext = filename.toLowerCase().split('.').pop();

            if (ext === 'latent') {
                return readLatentMetadataMerged(data);
            } else if (ext === 'json') {
                return readJsonMetadataMerged(data);
            } else {
                return readPngMetadataMerged(data);
            }
        }

        /**
         * 合并模式：从 PNG 文件中读取并合并数据
         * @param {Uint8Array} data - PNG 文件数据
         * @returns {Object|null} - { prompt: {...}, workflow: {...} }
         */
        async function readPngMetadataMerged(data) {
            try {
                const textDecoder = new TextDecoder('utf-8');
                let offset = 8;
                let promptData = null;
                let workflowData = null;

                while (offset < data.length - 12) {
                    const length = (data[offset] << 24) | (data[offset + 1] << 16) |
                                   (data[offset + 2] << 8) | data[offset + 3];

                    if (length < 0 || length > data.length - offset - 12) break;

                    const type = textDecoder.decode(data.slice(offset + 4, offset + 8));

                    if (type === 'tEXt' || type === 'iTXt') {
                        const chunkData = data.slice(offset + 8, offset + 8 + length);
                        const text = textDecoder.decode(chunkData);
                        const parsed = parsePngText(text);
                        if (parsed.prompt && !promptData) {
                            promptData = parsed.prompt;
                        }
                        if (parsed.workflow && !workflowData) {
                            workflowData = parsed.workflow;
                        }
                    }

                    if (type === 'IEND') break;
                    offset += 12 + length;
                }

                // 解析字符串为对象
                if (promptData && typeof promptData === 'string') {
                    try {
                        promptData = JSON.parse(promptData);
                    } catch (e) {
                        console.error('Merged mode: Failed to parse prompt JSON', e);
                    }
                }
                if (workflowData && typeof workflowData === 'string') {
                    try {
                        workflowData = JSON.parse(workflowData);
                    } catch (e) {
                        console.error('Merged mode: Failed to parse workflow JSON', e);
                    }
                }

                // 合并模式需要同时有 prompt 和 workflow
                if (!promptData) {
                    showModal(t('noPromptField'), 'error');
                    return null;
                }

                if (!workflowData || !workflowData.nodes) {
                    showModal(t('noWorkflowData'), 'error');
                    return null;
                }

                const mergedPrompt = mergePromptAndWorkflow(promptData, workflowData);
                return { prompt: mergedPrompt, workflow: workflowData };
            } catch (e) {
                console.error('Merged mode PNG read error:', e);
                return null;
            }
        }

        /**
         * 合并模式：从 Latent 文件中读取并合并数据
         * @param {Uint8Array} data - Latent 文件数据
         * @returns {Object|null} - { prompt: {...}, workflow: {...} }
         */
        async function readLatentMetadataMerged(data) {
            try {
                if (data.length < 8) return null;

                const headerSize = Number(
                    new BigUint64Array(data.slice(0, 8).buffer)[0]
                );

                if (headerSize < 0 || headerSize > data.length - 8) {
                    return null;
                }

                const textDecoder = new TextDecoder('utf-8');
                const headerJson = textDecoder.decode(
                    data.slice(8, 8 + headerSize)
                );

                const header = JSON.parse(headerJson);

                if (header.__metadata__) {
                    const metadata = header.__metadata__;
                    let promptData = null;
                    let workflowData = null;

                    if (metadata.prompt) {
                        try {
                            promptData = JSON.parse(metadata.prompt);
                        } catch {
                            promptData = metadata.prompt;
                        }
                    }

                    if (metadata.workflow) {
                        try {
                            workflowData = JSON.parse(metadata.workflow);
                        } catch {
                            workflowData = metadata.workflow;
                        }
                    }

                    // 合并模式需要同时有 prompt 和 workflow
                    if (!promptData) {
                        showModal(t('noPromptField'), 'error');
                        return null;
                    }

                    if (!workflowData || !workflowData.nodes) {
                        showModal(t('noWorkflowData'), 'error');
                        return null;
                    }

                    const mergedPrompt = mergePromptAndWorkflow(promptData, workflowData);
                    return { prompt: mergedPrompt, workflow: workflowData };
                }

                showModal(t('noWorkflowData'), 'error');
                return null;
            } catch (e) {
                console.error('Merged mode Latent read error:', e);
                return null;
            }
        }

        /**
         * 合并模式：从 JSON 文件中读取并合并数据
         * @param {Uint8Array} data - JSON 文件数据
         * @returns {Object|null} - { prompt: {...}, workflow: {...} }
         */
        async function readJsonMetadataMerged(data) {
            try {
                const textDecoder = new TextDecoder('utf-8');
                const text = textDecoder.decode(data);
                const json = JSON.parse(text);

                // 需要同时有 prompt 和 workflow 字段
                if (!json.prompt) {
                    showModal(t('noPromptField'), 'error');
                    return null;
                }

                if (!json.workflow) {
                    showModal(t('noWorkflowData'), 'error');
                    return null;
                }

                const promptData = typeof json.prompt === 'string' ?
                    JSON.parse(json.prompt) : json.prompt;
                const workflowData = typeof json.workflow === 'string' ?
                    JSON.parse(json.workflow) : json.workflow;

                const mergedPrompt = mergePromptAndWorkflow(promptData, workflowData);
                return { prompt: mergedPrompt, workflow: workflowData };
            } catch (e) {
                console.error('Merged mode JSON read error:', e);
                return null;
            }
        }

        /**
         * ============================================================
         * P+FW 模式解析函数 - 合并 Prompt 和 FullWorkflow
         * ============================================================
         * 以 full_workflow 为基础结构，用 prompt 中的执行结果补充
         */

        /**
         * P+FW 模式：从文件中读取并合并元数据
         * @param {Uint8Array} data - 文件数据
         * @param {string} filename - 文件名
         * @returns {Object|null} - { prompt: {...}, workflow: {...} }
         */
        async function readMetadataPromptFW(data, filename) {
            const ext = filename.toLowerCase().split('.').pop();

            if (ext === 'latent') {
                return readLatentMetadataPromptFW(data);
            } else if (ext === 'json') {
                return readJsonMetadataPromptFW(data);
            } else {
                return readPngMetadataPromptFW(data);
            }
        }

        /**
         * P+FW 模式：从 PNG 文件中读取并合并数据
         * @param {Uint8Array} data - PNG 文件数据
         * @returns {Object|null} - { prompt: {...}, workflow: {...} }
         */
        async function readPngMetadataPromptFW(data) {
            try {
                const textDecoder = new TextDecoder('utf-8');
                let offset = 8;
                let promptData = null;
                let workflowData = null;

                while (offset < data.length - 12) {
                    const length = (data[offset] << 24) | (data[offset + 1] << 16) |
                                   (data[offset + 2] << 8) | data[offset + 3];

                    if (length < 0 || length > data.length - offset - 12) break;

                    const type = textDecoder.decode(data.slice(offset + 4, offset + 8));

                    if (type === 'tEXt' || type === 'iTXt') {
                        const chunkData = data.slice(offset + 8, offset + 8 + length);
                        const text = textDecoder.decode(chunkData);
                        const parsed = parsePngText(text);

                        if (parsed.prompt && !promptData) {
                            promptData = JSON.parse(parsed.prompt);
                        }
                        if (parsed.full_workflow && !workflowData) {
                            workflowData = JSON.parse(parsed.full_workflow);
                        }
                    }

                    if (type === 'IEND') break;
                    offset += 12 + length;
                }

                if (!promptData) {
                    showModal(t('noPromptField'), 'error');
                    return null;
                }

                if (!workflowData) {
                    showModal(t('noFullWorkflowData'), 'error');
                    return null;
                }

                const mergedPrompt = mergePromptAndWorkflow(promptData, workflowData);
                return { prompt: mergedPrompt, workflow: workflowData };
            } catch (e) {
                console.error('P+FW mode PNG read error:', e);
                return null;
            }
        }

        /**
         * P+FW 模式：从 Latent 文件中读取并合并数据
         * @param {Uint8Array} data - Latent 文件数据
         * @returns {Object|null} - { prompt: {...}, workflow: {...} }
         */
        async function readLatentMetadataPromptFW(data) {
            try {
                if (data.length < 8) return null;

                const headerSize = Number(
                    new BigUint64Array(data.slice(0, 8).buffer)[0]
                );

                if (headerSize < 0 || headerSize > data.length - 8) {
                    return null;
                }

                const textDecoder = new TextDecoder('utf-8');
                const headerJson = textDecoder.decode(
                    data.slice(8, 8 + headerSize)
                );

                const header = JSON.parse(headerJson);

                if (header.__metadata__) {
                    const metadata = header.__metadata__;
                    let promptData = null;
                    let workflowData = null;

                    if (metadata.prompt) {
                        promptData = JSON.parse(metadata.prompt);
                    }
                    if (metadata.full_workflow) {
                        workflowData = JSON.parse(metadata.full_workflow);
                    }

                    if (!promptData) {
                        showModal(t('noPromptField'), 'error');
                        return null;
                    }

                    if (!workflowData) {
                        showModal(t('noFullWorkflowData'), 'error');
                        return null;
                    }

                    const mergedPrompt = mergePromptAndWorkflow(promptData, workflowData);
                    return { prompt: mergedPrompt, workflow: workflowData };
                }

                showModal(t('noFullWorkflowData'), 'error');
                return null;
            } catch (e) {
                console.error('P+FW mode Latent read error:', e);
                return null;
            }
        }

        /**
         * P+FW 模式：从 JSON 文件中读取并合并数据
         * @param {Uint8Array} data - JSON 文件数据
         * @returns {Object|null} - { prompt: {...}, workflow: {...} }
         */
        async function readJsonMetadataPromptFW(data) {
            try {
                const textDecoder = new TextDecoder('utf-8');
                const text = textDecoder.decode(data);
                const json = JSON.parse(text);

                // 需要同时有 prompt 和 full_workflow 字段
                if (!json.prompt) {
                    showModal(t('noPromptField'), 'error');
                    return null;
                }

                if (!json.full_workflow) {
                    showModal(t('noFullWorkflowData'), 'error');
                    return null;
                }

                const promptData = typeof json.prompt === 'string' ?
                    JSON.parse(json.prompt) : json.prompt;
                const workflowData = typeof json.full_workflow === 'string' ?
                    JSON.parse(json.full_workflow) : json.full_workflow;

                const mergedPrompt = mergePromptAndWorkflow(promptData, workflowData);
                return { prompt: mergedPrompt, workflow: workflowData };
            } catch (e) {
                console.error('P+FW mode JSON read error:', e);
                return null;
            }
        }

        /**
         * 将完整 Workflow 格式转换为 Prompt API 格式
         * 完整 Workflow 格式包含更多元数据（节点位置、大小等），但需要转换才能使用
         *
         * @param {Object} workflow - 完整 Workflow 格式的 JSON 对象
         * @returns {Object} - Prompt API 格式的对象
         */
        function convertWorkflowToPrompt(workflow) {
            const prompt = {};
            const nodeMap = new Map();

            // 首先建立节点 ID 映射
            for (const node of workflow.nodes || []) {
                nodeMap.set(node.id, node);
            }

            // 构建链接映射：linkId -> { origin_id, origin_slot, target_id, target_slot }
            const linkMap = new Map();
            for (const link of workflow.links || []) {
                // link 格式: [id, origin_id, origin_slot, target_id, target_slot, type]
                if (link.length >= 5) {
                    linkMap.set(link[0], {
                        origin_id: link[1],
                        origin_slot: link[2],
                        target_id: link[3],
                        target_slot: link[4]
                    });
                }
            }

            // 转换每个节点
            for (const node of workflow.nodes || []) {
                const nodeData = {
                    inputs: {},
                    class_type: node.type,
                    _meta: {
                        title: node.properties?.["Node name for S&R"] || node.type
                    }
                };

                // 保存节点位置信息（如果有）
                if (node.pos && Array.isArray(node.pos) && node.pos.length >= 2) {
                    nodeData._meta.pos = [node.pos[0], node.pos[1]];
                }
                if (node.size && Array.isArray(node.size) && node.size.length >= 2) {
                    nodeData._meta.size = [node.size[0], node.size[1]];
                }

                // 处理 Note 和 MarkdownNote 节点（没有 inputs，但有 widgets_values）
                if (node.type === 'Note' || node.type === 'MarkdownNote') {
                    if (node.widgets_values && node.widgets_values.length > 0) {
                        nodeData.inputs.text = node.widgets_values[0];
                    }
                    prompt[String(node.id)] = nodeData;
                    continue;
                }

                // 收集该节点作为目标的所有链接（用于确定输入连接）
                const incomingLinks = [];
                for (const [linkId, linkInfo] of linkMap) {
                    if (linkInfo.target_id === node.id) {
                        incomingLinks.push(linkInfo);
                    }
                }

                // 处理 widgets_values 和 inputs 的配对
                let widgetIndex = 0;

                for (const input of node.inputs || []) {
                    if (input.link !== undefined && input.link !== null) {
                        // 优先处理连接输入（即使 input 也有 widget）
                        const linkInfo = linkMap.get(input.link);
                        if (linkInfo) {
                            nodeData.inputs[input.name] = [
                                String(linkInfo.origin_id),
                                linkInfo.origin_slot
                            ];
                        }
                        // 如果这个输入也有 widget，需要跳过对应的 widgetIndex
                        if (input.widget && node.widgets_values) {
                            widgetIndex++;
                        }
                    } else if (input.widget && node.widgets_values && widgetIndex < node.widgets_values.length) {
                        // 这是 widget 参数（没有连接），从 widgets_values 取值
